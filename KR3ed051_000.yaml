front:
  text: 序華與余家世為姻婭華君岫雲精通岐黃術常存利濟救人之心孜孜不倦嚮慕吳門葉天士先生為當世盧扁留心覓其醫案約計盈萬分門選刻共成十卷名曰臨證指南已遍行海宇矣壬申歲又將其續補醫案溫熱論與平生所集各種經驗奇方付刊以備救急其願甚誠忽於癸秋謝世其方止刻十之二三半途而廢見者咸為惋惜華君好友岳君廷璋不忍漠視力勸徽蘇義商程葉兩君子授梓完璧以公同志一日漢川程君來蜀出此編丐余作序予素不知醫且當公務紛拿軍書旁午竟不暇及第展閱一過瞭然心目洵為青囊家不可缺一之書即盧扁復起亦不能捨是而別開窔奧倘於鄉陬僻壤症患奇難一時罕有良醫調劑備此查考對症用藥立能起死回生功效匪淺慎勿以此編易簡而忽諸乾隆四十年冬小春月賜進士出身欽命四川按察使司按察司加三級凝臺杜玉林撰並書
