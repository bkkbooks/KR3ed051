body:
  text: 卷一溫熱論續醫案溫熱論溫邪上受按邪從口鼻而入故曰上受但春溫冬時伏寒藏於少陰遇春時溫氣而發非必上受之邪也則此所論溫邪乃是溫風溫濕之發於春末夏初者也首先犯肺逆傳心胞肺主氣屬衛心主血屬營辨營衛氣血雖與傷寒同若論治法則與傷寒大異蓋傷寒之邪留戀在表然後化熱入里溫邪則熱變最速未傳心胞邪尚在肺肺主氣其合皮毛故云在表在表初用辛涼輕劑挾風則加入薄荷牛蒡之屬挾濕加蘆根滑石之流或透濕於熱外或滲濕於熱下不與熱相搏勢必孤矣不爾風挾溫熱而燥生清竅必干謂水主之氣不能上榮兩陽相劫也濕與溫合蒸鬱而矇蔽於上清竅為之壅塞濁邪害清也其病有類傷寒其驗之之法傷寒多有變症溫熱雖久在一經不移以此為辨前言辛涼散風甘淡驅濕若病仍不解是漸欲入營也營分受熱則血液受劫心神不安夜甚無寐或斑點隱隱即撤去氣藥如從風熱陷入者用犀角竹葉之屬如從濕熱陷入者犀角花露之品參入涼血清熱方中若加煩躁大便不通金汁亦可加入老年或平素有寒者以人中黃代之急急透斑為要若斑出熱不解者胃津亡也主以甘寒重則如玉女煎輕則如梨皮蔗漿之類或其人腎水素虧雖未及下焦先自倣徨矣必驗之於舌如甘寒之中加入鹹寒務在先安未受邪之地恐其陷入易易耳若其邪始終在氣分流連者可冀其戰汗透邪法宜益胃令水與汗並熱達腠開邪從汗出解後胃氣空虛當膚冷一晝夜待氣還自溫暖如常矣蓋戰汗而解邪退正虛陽從汗泄故漸膚冷未必即成脫症此時宜令病者安舒靜臥以養陽氣來復旁人切勿驚徨頻頻呼喚擾其元神使其煩躁但診其脈若虛軟和緩雖倦臥不語汗出膚冷卻非脫症若脈急疾躁擾不臥膚冷汗出便為氣脫之症矣更有邪盛正虛不能一戰而解停一二日再戰汗而愈者不可不知再論氣病有不傳血分而邪留三焦亦如傷寒中少陽病也彼則和解表裡之半此則分消上下之勢隨症變法如近時杏朴苓等類或如溫膽湯之走泄因其仍在氣分猶可望其戰汗之門戶轉瘧之機括大凡看法衛之後方言氣營之後方言血在衛汗之可也按辛涼開肺便是汗劑非如傷寒之用麻桂辛溫也到氣才可清氣入營猶可透熱轉氣如犀角玄參羚羊等物入血就恐耗血動血直須涼血散血如生地丹皮阿膠赤芍等物否則前後不循緩急之法慮其動手便錯反至慌張矣且吾吳濕邪害人最廣如面色白者須要顧其陽氣濕勝則陽微也法應清涼然到十分之六七即不可過於寒涼恐成功反棄何以故耶濕熱一去陽亦衰微也面色蒼者須要顧其津液清涼到十分之六七往往熱減身寒者不可就云虛寒而投補劑恐爐煙雖熄灰中有火也須細察精詳方少少與之慎不可直率而往也又有酒客里濕素盛外邪入里里濕為合在陽旺之軀胃濕恆多在陰盛之體脾濕亦不少然其化熱則一熱病救陰則易通陽最難救陰不在血而在津與汗通陽不在溫而在利小便然較之雜症則有不同也再論三焦不得從外解必致成里結里結於何在陽明胃與腸也亦須用下法不可以氣血之分就不可下也但傷寒熱邪在裡劫爍津液下之宜猛此多濕邪內搏下之宜輕傷寒大便溏為邪已盡不可再下濕溫病大便溏為邪未盡必大便硬慎不可再攻也以屎燥為無濕矣再人之體脘在腹上其地位處於中按之痛或自痛或痞脹當用苦泄以其人腹近也必驗之於舌或黃或濁可與小陷胸湯或瀉心湯隨症治之或白不燥或黃白相兼或灰白不渴慎不可亂投苦泄其中有外邪未解里先結者或邪郁未伸或素屬中冷者雖有脘中痞痛宜從開泄宣通氣滯以達歸於肺如近俗之杏蔻橘桔等是輕苦微辛具流動之品可耳再前云舌黃或濁須要有地之黃若光滑者乃無形濕熱中已虛象大忌前法其臍以上為大腹或滿或脹或痛此必邪已入里矣表症必無或十之存一亦要驗之於舌或黃甚或如沉香色或如灰黃色或老黃色或中有斷紋皆當下之如小承氣湯用檳榔青皮枳實玄明粉生首烏等若未現此等舌不宜用此等法恐其中有濕聚太陰為滿或寒濕錯雜為痛或氣壅為脹又當以別法治之再黃苔不甚厚而滑者熱未傷津猶可清熱透表若雖薄而乾者邪雖去而津受傷也苦重之藥當禁宜甘寒輕劑可也再論其熱傳營舌色必絳絳深紅色也初傳絳色中兼黃白色此氣分之邪未盡也泄衛透營兩和可也純絳鮮澤者胞絡受病也宜犀角鮮生地連翹鬱金石菖蒲等延之數日或平素心虛有痰外熱一陷里絡就閉非菖蒲鬱金等所能開須用牛黃丸至寶丹之類以開其閉恐其昏厥為痙也再色絳而舌中心乾者乃心胃火燔劫爍津液即黃連石膏亦可加入若煩渴煩熱舌心干四邊色紅中心或黃或白者此非血分也乃上焦氣熱爍津急用涼膈散散其無形之熱再看其後轉變可也慎勿用血藥以滋膩難散至舌絳望之若干手捫之原有津液此津虧濕熱熏蒸將成濁痰蒙閉心胞也再有熱傳營血其人素有瘀傷宿血在胸膈中挾熱而搏其舌色必紫而暗捫之濕當加入散血之品如琥珀丹參桃仁丹皮等不爾瘀血與熱為伍阻遏正氣遂變如狂發狂之症若紫而腫大者乃酒毒衝心若紫而干晦者腎肝色泛也難治舌色絳而上有黏膩似苔非苔者中挾穢濁之氣急加芳香逐之舌絳欲伸出口而抵齒難驟伸者痰阻舌根有內風也舌絳而光亮胃陰亡也急用甘涼濡潤之品若舌絳而乾燥者火邪劫營涼血清火為要舌絳而有碎點白黃者當生疳也大紅點者熱毒乘心也用黃連金汁其有雖絳而不鮮乾枯而痿者此腎陰涸急以阿膠雞子黃地黃天冬等救之緩則恐涸極而無救也其有舌獨中心絳乾者此胃熱心營受灼也當於清胃方中加入清心之品否則延及於尖為津干火盛也舌尖絳獨干此心火上炎用導赤散瀉其腑再舌胎白厚而乾燥者此胃燥氣傷也滋腎藥中加甘草令甘守津還之意舌白而薄者外感風寒也當疏散之若白乾薄者肺津傷也如麥冬花露蘆根汁等輕清之品為上者上之也若白苔絳底者濕遏熱伏也當先泄濕透熱防其就干也勿憂之再從里透於外則變潤矣初病舌就干神不昏者急養正微加透邪之藥若神已昏此內陷矣不可救藥又不拘何色舌上生芒刺者皆是上焦熱極也當用青布拭冷薄荷水揩之即去者輕旋即生者險矣舌苔不燥自覺悶極者屬脾濕盛也或有傷痕血跡者必問曾經搔挖否不可以有血而便為枯症仍從濕治可也再有神情清爽舌脹大不能出口者此脾濕胃熱鬱極化風而毒延口也用大黃磨入當用劑內則舌脹自消矣再舌上白苔黏膩吐出濁厚涎沫者口必甜味也為脾疸病乃濕熱氣聚與穀氣相搏土有餘也盈滿則上泛當用醒頭草芳香辛散以逐之則退若舌上苔如鹼者胃中宿滯挾濁穢鬱伏當急急開泄否則閉結中焦不能從募原達出矣若舌無苔而有如煙煤隱隱者不渴肢寒知挾陰病如口渴煩熱平時胃燥舌也不可攻之若燥者甘寒益胃若潤者甘溫扶中此何故外露而里無也若舌黑而滑者水來剋火為陰症當溫之若見短縮此腎氣竭也為難治欲救之加人參五味子勉希萬一舌黑而乾者津枯火熾急急瀉南補北若燥而中心厚㾦者土燥水竭急以鹹苦下之舌淡紅無色者或干而色不榮者當是胃津傷而氣不化液也當用炙甘草湯不可用寒涼藥若舌白如粉而滑四邊色紫絳者溫疫病初入募原未歸胃腑急急透解莫待傳陷而入為險惡之病且見此舌者病必見凶須要小心凡斑疹初見須用紙捻照看胸背兩脅點大而在皮膚之上者為斑或云頭隱隱或瑣碎小粒者為疹又宜見而不宜見多按方書謂斑色紅者屬胃熱紫者熱極黑者胃爛然亦必看外症所合方可斷之然而春夏之間濕病俱發疹為甚且其色要辨如淡紅色四肢清口不甚渴脈不洪數非虛斑即陰斑或胸微見數點面赤足冷或下利清穀此陰盛格陽於上而見當溫之若斑色紫小點者心包熱也點大而紫胃中熱也黑斑而光亮者熱勝毒盛雖屬不治若其人氣血充者或依法治之尚可救若黑而晦者必死若黑而隱隱四旁赤色火鬱內伏大用清涼透發間有轉紅成可救者若夾斑帶疹皆是邪之不一各隨其部而泄然斑屬血者恆多疹屬氣者不少斑疹皆是邪氣外露之象發出宜神情清爽為外解里和之意如斑疹出而昏者正不勝邪內陷為患或胃津內涸之故再有一種白㾦小粒如水晶色者此濕熱傷肺邪雖出而氣液枯也必得甘藥補之或未至久延傷及氣液乃濕鬱衛分汗出不徹之故當理氣分之邪或白如枯骨者多凶為氣液竭也再溫熱之病看舌之後亦須驗齒齒為腎之餘齦為胃之絡熱邪不燥胃津必耗腎液且二經之血皆走其地病深動血結瓣於上陽血者色必紫紫如干漆陰血者色必黃黃如醬瓣陽血若見安胃為主陰血若見救腎為要然豆瓣色者多險若症還不逆者尚可治否則難治矣何以故耶蓋陰下竭陽上厥也齒若光燥如石者胃熱甚也若無汗惡寒衛偏勝也辛涼泄胃透汗為要若如枯骨色者腎液枯也為難治若上半截潤水不上承心火炎上也急急清心救水俟枯處轉潤為妥若咬牙齧齒者濕熱化風痙病但咬牙者胃熱氣走其絡也若咬牙而脈症皆衰者胃虛無谷以內榮亦咬牙也何以故耶虛則喜實也舌本不縮而硬而牙關咬定難開者此非風痰阻絡即欲作痙症用酸物擦之即開酸走筋木來泄土故也若齒垢如灰糕樣者胃氣無權津亡濕濁用事多死而初病齒縫流清血痛者胃火沖激也不痛者龍火內燔也齒焦無垢者死齒焦有垢者腎熱劫胃也當微下之或玉女煎清胃救腎可也再婦人病溫與男子同但多胎前産後以及經水適來適斷大凡胎前病古人皆以四物加減用之謂護胎為要恐來害妊如熱極用井底泥藍布浸冷覆蓋腹上等皆是保護之意但亦要看其邪之可解處用血膩之藥不靈又當審察不可認板法然須步步保護胎元恐損正邪陷也至於産後之法按方書謂慎用苦寒藥恐傷其已亡之陰也然亦要辨其邪能從上中解者稍從症用之亦無妨也不過勿犯下焦且屬虛體當如虛怯人病邪而治總之毋犯實實虛虛之禁況産後當血氣沸騰之候最多空竇邪勢必乘虛內陷虛處受邪為難治也如經水適來適斷邪將陷血室少陽傷寒言之詳悉不必多贅但數動與正傷寒不同仲景立小柴胡湯提出所陷熱邪參棗扶胃氣以衝脈隸屬陽明也此與虛者為合治若邪熱陷入與血相結者當宗陶氏小柴胡湯去參棗加生地桃仁楂肉丹皮或犀角等若本經血結自甚必少腹滿痛輕者刺期門重者小柴胡湯去甘藥加延胡歸尾桃仁挾寒加肉桂心氣滯者加香附陳皮枳殼等然熱陷血室之症多有譫語如狂之象防是陽明胃實當辨之血結者身體必重非若陽明之輕旋便捷者何以故耶陰主重濁絡脈被阻側旁氣痹連胸背皆拘束不遂故去邪通絡正合其病往往延久上逆心包胸中痛即陶氏所謂血結胸也王海藏出一桂枝紅花湯加海蛤桃仁原為表裡上下一齊盡解之理看此方大有巧手故録出以備學者之用續醫案曹四六述去冬因惱怒時食厚味遂致不飢噯氣脘痹食物不下視舌上布苔如粉不渴飲大便通調議從太陰脾陽為寒痰濁氣凝遏辛溫定法厚朴草果仁薑汁蓽茇生益智仁廣皮白又前因陽結濁聚舌苔白厚不渴飲用芳香辛溫得效近日食物不慎水穀氣凝清陽再窒為嘔舌苔猶未淨便下白膩如凍腑陽亦衰公丁香柄蓽茇茯苓生益智仁厚朴生乾薑胡二六疾走作勞身前脅腹閃氣上下串痛交正月寒戰氣衝呼吸皆阻腹脹臍上橫梗有形作痛自痢已兩月思勞必傷陽春令病加是木旺侮土中陽困憊濁氣充塞正氣全傷大肉盡削述食入逾時必加嘔噫後天生化之源大困議急理中土之陽人參茯苓公丁香柄川椒烏梅肉炒黃乾薑潘四二中年脈垂入尺澤按之緩濡腰椎痠痛形體即欲傴僂旬余大便必下血此少壯不慎腎真先奪督脈不司固束議用青囊斑龍丸高七一老年逆氣右升脘阻妨食涎沫上湧此屬反胃夫陽氣結閉為無形之傷前藥小效未幾反復以老人生陽不至耳人參生淡乾薑炒黑附子豬膽汁沈十七兀坐目注針黹少陽氣火上升陽明氣血因熱怫逆遂有結癭瘰癧之纍前醫不明解鬱兩和肝胃之治致病日加增今每日寒熱心躁若裂經水較前已少須慮熱熾血乾且納穀大減難投重劑清寒生鱉甲牡丹皮川貝母香附穀芽夏枯草花楊二七食入即飢心空易驚經水或歇或至病起産後逾年不復自述多食生冷據理肝陰久損不宜驟用溫補人參茯神炙草黃精龍骨金箔顧腹痛氣上下行動即緩從腑陽治人參生穀芽茯苓煨姜新會皮砂仁殼李三八哮喘久發小溲頻利此腎虛氣不收納痰飲從氣而上初病本屬外邪然數年混處邪附臟腑之外廓散逐焉得中病宿哮不發時用腎氣丸三錢喘哮坐不得臥議用開太陽之裡小青龍湯去麻辛唐三五病是勞傷陽氣陽衰不主流行清濁升降不得自如是為虛痞之結內經謂勞者溫之此溫字乃溫養之稱若吳萸大熱開泄乃是攻克與勞傷原氣相反苓桂朮甘湯賈二一痰血頻發七八次形寒妨食無治痰嗽之理急扶後天生氣望其知味進谷戊己湯錢十八沖年陰精走泄陽無依倚血隨氣升色紫成塊此血出於肝絡法當鎮補人參炒黑棗仁炒白芍炙草青花龍骨金箔姚二一述四月患蛾喉痹必系溫熱犯上溫不盡解留邪化熱肺津劫爍喉燥癢嗆防有氣損熱熾失血之纍甘寒潤劑不致傷胃緑豆殼麥冬生甘草連翹南花粉金銀花蔗漿半杯又浮熱上炎精走泄於下致陰液陽精不肯上供望色萎瘦納食不旺攝陰恐妨胃口況初夏曾患喉症大暑熱泄陰難生復先議水陸二仙丹攝固精關人參秋石芡實金櫻子膏丸顧四三操持無有不動心神心陽上引相火交升燔灼營液舌為心苗遂起痱瘰病由情志不適非湯藥直清直降可治議天王補心丹制伏蹺陽道路營液得以升降自如然必心境怡悅方能卻病天王補心丹李四三長夏時令溫熱內阻氣分宗內經濕淫於內治以淡滲佐以苦溫飛滑石川通草淡竹葉杏仁厚朴茹三五向來無病因服地黃丸反左脅腰中臍旁氣攻作痛間有遺精目暗虛花或起浮翳據述用細辛桂枝翳退遂加頭痛此體質陽虛誤用陰寒膩濁所致夫肝主疏泄腎主藏固肝宜涼腎宜溫納腎佐以通肝溫下仍佐腎陰以制木火是為復方當歸小茴補骨脂胡桃肉茯苓穿山甲炒黃柏青鹽林十八色蒼形瘦稟質陰虛火亢津液不充喜冷飲夏季熱蒸須培生氣順天時以調理麥冬知母川貝地骨皮丹皮緑豆皮項二八心熱巔空交寅卯帶下向來陰不足少陽陽動中虛食減靜養至秋涼可望陰充人參柏子仁丹參天冬茯苓建蓮龍骨白薇曹十四笑則癇厥病發晝少夜多思二月起病春木正旺內應厥陰肝臟木火乃陽極之化其來迅速由內而升神明遂亂口吐涎沫四肢寒冷肝病何疑由春病及長夏醒則如無納食如昔法以純苦直泄厥陰蹺陽蘆薈青黛龍膽草川楝子黑山梔白芍青皮歸尾豬膽汁又前方用純苦直清肝膽初服即瀉病久陰分已虛議理陰和陽入酸以約束之生雞子黃阿膠川連黃柏生白芍米醋徐二六胃減痰血頻發上年誤服玄參山梔致便溏瀉此受苦滑寒涼之纍人參建中湯鄒五三酒客食管窄隘向有脘痛今多食即反胃氣阻日久必致瘀凝食物宜淡薄以上中二焦宣通氣血治桃仁蒲黃降香末蘇梗香附橘紅程六三形瘦肌削稟質偏熱夏秋病甚是陰虧不耐暑熱發泄之氣耳霜降收肅令行浮陽潛伏陰得自守病覺稍退述食辛辣熱燥不安其臟陰五液為陽蒸變痰非如痰飲可用陽藥溫通者人參萸肉川石斛磁石淡秋石胡桃肉女貞子旱蓮草和痰血上午偏多氣分熱熾金石斛川貝母桑葉南花粉大沙參知母單七歲為母喪悲泣淹淹不食面黃唇淡情志不適生陽郁窒內經謂思為心疾郁必傷脾病屬無形非傷食惡食之比稚年調理後天脾胃為要佐以開益心氣人參茯苓炙甘草淮小麥益智仁石菖蒲於馳騎習武百脈震動動則絡逆為痛血沸出口納食起居無異平日非虛損也凡氣為血帥氣順血自循經不必因血用沉降重藥枇杷葉炒蘇子生苡仁金石斛炒桃仁降香末王四六望五年歲真陽已衰納食逾二三日反胃湧吐仍有不化之形痰涎濁水俱出大便漸祕此關格大症陰枯陽結使然人參半夏茯苓泡淡吳萸生淡乾薑夜另服半硫丸一錢五分蔣三五晨瀉數年跗腫足冷長夏土旺初交知飢痞悶妨食述兩三次半産不育下焦氣撒不固任督交空本病當以肝腎奇脈設法今議先以胃藥以近日雨後暑濕乘隙侵犯耳人參茯苓益智仁砂仁殼炒扁豆木瓜又連年半産不育瘕泄足跗浮腫前用養胃和肝非治本病因暑濕傷而設議固下焦之陰益中宮之陽人參禹糧石紫石英五味子菟絲餅砂仁用蒸餅為丸邢暴怒傷肝白帶下注繼而間血人身衝任督帶諸脈皆麗身半已下醫用上中二焦疲藥焉能圖幸自言月事來而漏帶息初起必少腹腰痛此內熱是血絡陰液損傷耳性嗜酒酒力先入肝膽急當禁止議固脈以攝下炒枸杞炒黑當歸白薇桑螵蛸殼青花龍骨生紫石英煎藥送震靈丹陸二一腰冷膝骨痠軟淋濁溺後莖中空痛少年未婚此是勉強勞傷精關且臥床必要墊實腰膂虛象大著交冬病加間食少胃弱非地黃膩滯知柏瀉陽可投菟絲子覆盆子芡實沙苑家韭子補骨脂舶茴香金櫻子線魚膠丸王二六過用心思營氣日漓心悸眩暈遺精腰膝下部畏冷陰陽造偏心腎交損議鎮怯佐以固攝溫納桑螵蛸人參茯神青花龍骨金箔鎖陽蜜丸顏病已半年夜寐易醒汗泄自覺元海震動腹鳴晨瀉年歲望六不僅經營煩勞傷陽腎真亦漸散越仍議固下法人參赤石脂禹餘糧五味子泡淡乾薑徐三九月事將至尻骨脊椎痠痛此督脈循行之位況經水之下必由衝脈産育頻多奇脈失固議治陰中之陽鹿茸人參歸身炒黑小茴茯苓川斛唐二一經來一日偶食冷物經水即止遂痞悶不食乳旁堅腫痛脹此是肝氣鬱結蓋經水由衝脈而下沖隸陽明胃中受冷而衝脈血凝理從肝胃同治青橘葉香附汁漏蘆蒲公英厚朴杏仁徐二八産後未經旬長途驅馳以勞形神歸值母喪悲哀哭泣傷及情志述肉瞤易驚恐少寐産傷陽分起見肌肉悉熱如焚乃陰不攝陽熟地炭萸肉龍骨茯神淮小麥南棗肉何三十述無病時形瘦病發時形充古稱入水之物無物不長陰寒襲入右肢肉瞤筋惕而痛指不屈伸法當通痹塞以逐留著川烏一兩炮黑全蠍一兩炙焦蜂房五錢炙焦自然銅五錢煅麝香五分炒熱大黑豆淋酒汁為丸每服一錢陳酒下汪肺熱膈消熱灼迅速如火臟真之陰日削先議清肺以平氣火法當苦降以輕咸補以重繼此再商滋養血液枯黃芩煎湯溶入阿膠二錢孫三三行走閃銼左腿肢筋弛無力亂藥雜投五六年不愈延及精血內損不司束筋充骨矣猶幸年壯冀其生真續旺藥用平補然必絶欲戒勞庶克臻效虎潛去鎖陽加蓯蓉精羊肉膠丸施二六陰寒已入陰股道路深遠湯藥過胃其力已薄邪錮仍在議用許學士法蠲痛丹每服一錢二分趙納食不充肌膚陽傷背痛陰囊冰冷經營作勞勞則氣乏經言勞者溫之甘溫益氣以養之歸耆建中湯陳五五操勞動怒耳鳴巔脹暈眩肢麻內起火風皆厥陽之化中年以後男子下元先虛慮其僕中議填鎮固攝以實下合乎上病治下之旨熟地玄武版靈磁石五味子山萸肉炒杞子天冬牛膝青鹽程二八摽梅逾期病由情志郁傷庸醫不究病因朝暮更方病延日久內經謂二陽之病發心脾蓋思傷心郁傷脾二臟有病不司統血笄年莫重於經水通調今經閉半載嘔吐清涎腹痛泄瀉心熱皮寒顯是木鬱乘土胃口漸敗生氣曷振病成乾血勞怯考古通經等丸難施於胃憊乏谷之體姑議安胃和肝俟秋深時再議人參白芍川楝子生淡乾薑川連烏梅粗桂枝炒焦歸身董二四風溫濕上受痹阻氣分上則咳嗆不得臥息下則溺少便溏夫肺主一身之氣化邪壅則升降不得自如仿經旨濕淫於內主以淡滲佐以苦溫為治飛滑石茯苓皮白蔻仁竹葉厚朴杏仁蘆根陳四二煩勞氣火多升少降喉中梗阻痰出噫氣凡酒肉皆助熱痰凝氣分上焦痹塞枇杷葉栝蔞皮降香末杜蘇子黑梔皮苡仁宋二四精壯年歲面色萎浮氣衝逆必心悸眩暈問足跗易冷間有遺泄此皆煩勞辦事心陽過用暗吸腎陰下元日虛虛風挾陽旋動不息全是內損之病治法取質味凝厚以填之甘酸以緩之重以鎮怯補以理虛方是培本尋源之治熟地四兩萸肉二兩瑣陽二兩炙茯神四兩五味一兩半龜甲心二兩秋石一兩青龍骨二兩生研金櫻膏二兩芡實四兩蜜丸夏三十陰筋曰宗筋肝主之冷則筋縮熱則弛長少壯莖痿起於長夏天氣已熱地中濕蒸內經病機一十九條例謂因濕者大筋耎短小筋弛長耎短為拘弛長為痿此雖統論痿症而言非指莖痿立論然理亦相通今逾年不愈大暑時令診得脈象非下焦陽衰兩目紅赤想經營煩冗之勞陽氣交集於上與暑熱內迫加以水穀之濕濕蘊化熱而爍筋致痿矣法當苦以堅陰燥以勝濕介以潛陽濕去熱清自有愈期生虎骨熟地蒼朮黃柏茯苓龜板石決明天冬鍾四五未及五旬肉消食減此未老已衰身動喘急足跗至晚必腫皆是腎真不司收攝納氣根本先撥草木微功難以恢復坎氣人乳粉五味子胡桃肉蜜丸人參湯送下王三三煩勞曲運神思形與神交傷陽氣旋動絡血何以寧靜甘以緩熱補以益虛必佐寧神鎮怯以攝之固之人參柏子霜炒枸杞焦歸身桂圓肉炙甘草龍骨茯神金箔單因閃挫脅痛久則嗆血絡血氣熱內迫新血瘀逆鮮生地藕節生桃仁新絳宋暑熱入營舌絳煩渴形脈皆不足怕邪陷神昏犀角尖南花粉連翹心益元散淡竹葉細葉菖蒲汁程二五男子思念未遂陰火內燔五液日奪孤陽升騰熏蒸上竅已失交泰之義此非外來之症凡陰精殘憊務在胃旺納穀生陰今咽喉鼻耳諸竅久遭陰火之迫寒涼清解僅調六氣中之火而臟真陰火乃閃電迅速莫遏清寒必不卻病良由精血內空草木藥餌不能生精充液耳細生地清阿膠豬脊筋天冬川石斛姜二四久患胸右有形形瘦畏風怕冷臥則咳嗆痰沫凡治痰飲須辨飲食食少已極議治中宮之陽苓桂朮甘湯徐狐疝氣墜鹿茸大茴當歸沙苑干蓯蓉生薑肉桂羊肉丸徐十七經水未來春末夏初痰血形瘦耳鳴食過如飢飢不納食肝陰不生熱自內灼漸成乾血勞症必要經來可愈但女工針黹凝眸諦視即動陽升火此大忌細生地天冬柏子仁丹參澤蘭知母曹辛溫芳香開氣舒郁嘔出血餅嘔吐頓減蓋氣阻血凝堵塞脘中升降之路而痛自服藥以來微微欲飲而大便結燥知不專於辛溫矣青蔥桃仁歸尾麻仁郁李仁冬葵子又瘀盡噯氣間嘔此陳腐未掃乃無形之聚用辛芳涼滑治之鮮省頭草五錢滾水泡湯和入竹瀝五錢分作三次服孫二八繞腰近臍久痛若空秋深屆冬四肢不暖此由幼年精未充旺早泄既損難復八脈失司是陰傷及陽藥須達及奇經可冀漸效鹿茸淡蓯蓉巴戟當歸茯苓虎膝骨牛膝大茴羊肉膠丸吳二四精濁已久行步無力食冷口吐酸水陽氣微弱治在脾腎益智仁家韭子覆盆子葫蘆巴遠志小茴菟絲子金櫻膏丸王四五陽結於上陰泄於下晨泄多因腎虛陰傷及陽胃口自憊舌畏辛辣不受桂附之猛烈虛腫虛脹先宜固劑人參禹餘糧赤石脂五味子砂仁末周三七精遺越日陰火忽沖神亂肉瞤筋惕此陰不戀陽以補虛鎮攝收斂幸年壯胃口不敗可以全愈熟地萸肉五味龍骨湖蓮茯神遠志邵六八望七男子下元必虛操持縈思陽墜入陰精腐即化紫黑之色宿者出竅新復瘀結溺出不痛非久積宿腐據述常飲火酒酒毒辛熱必先入肝腎虛宜溫補肝宜清涼閲方用歸脾湯且非嚴氏法雜湊成方焉能治此大症細生地清阿膠黑穭豆皮赤芍丹皮童便一杯衝入周五十陽維脈循行外踝遇勞形辦事環跳跗骨痠麻而痛丹溪云麻為氣虛蓋年力已衰不得安養怡悅痿論云意傷肢欲廢矣且痛處肉消形癟無腫赤之象此氣血不布涵濡筋骨不足之症比比然生精羊肉虎脛骨肉蓯蓉枸杞子沙苑巴戟肉牛膝當歸川石斛翁四四少腹有形左脅䐜脹內發必肌肉麻木嘔吐痰沫不爽此屬肝厥由乎懷抱抑鬱不得條達數載病不肯愈者為此淡吳萸川楝子生香附南山查青橘葉牡蠣何二二壯年脈芤少神色痿肉瘦食進不充形骸不耐煩勞乃內損也節欲養精安神養氣藥用血肉有情氣血兼補年少望其生振河車人參熟地五味山藥茯神蓮肉芡實宋六十吸受暑熱異氣入表中之裡為淋痛溺赤形肥素有痰濕議通太陽桂枝木豬苓茯苓萆薢海金沙寒水石鄭五九夏至陰生忽然口喎頰斜耳竅無聞此非外來之邪皆由男子望六下元已空下虛則上實水虧風內起凡腎以溫為養肝宜涼乃平溫養腎精必佐涼肝水中有真陽內蓄是為命根蓋肝膽相火內寄性惡熱燥用七方中之復方熟地磁石龜板丹皮五味天冬枸杞蓯蓉菊花炭川斛方七七高年宿疝不愈入夏陰囊足跗脹大乃陰臟之真漸竭腑中陽氣不行一派濁陰迷漫述二便皆不通爽明知老弱久虛然呆補必助濁壅塞議通陽一法白通湯去蔥白周五一正視一物見二睨視則否凡積勞氣泄陽傷當夏熱氣再大泄雖曰肝竅開目實臟真精華會聚之處當甘緩理虛酸收其散大忌苦降辛開桂圓肉枸杞子炙黑甘草五味子山萸肉菊花炭俞五一久嗽失音飲食仍進自覺淹淹無力此是內傷勞倦夏月泄利是暑濕氣感不在本病之例食減肉消治嗽無益以肺痿論白芨生黃耆炙甘草苡仁黃精周二一蓐勞下元先空咳音不轉必致嘔吐是衝脈虛氣逆上攻熏蒸肺臟延及不飢減食腹痛便溏乃清內熱泄肺醫嗽之誤炒當歸生白芍炙草南棗肉吳五二平昔飲酒夏令再受地濕之感內外濕邪傷陽阻遏氣機流行遂致一身盡腫針刺出水稍癟復腫皆由陽氣已衰水濕無以分逐苟非氣雄通陽陰凝何以走泄所服八味湯僅溫煦腎陽與陽維不合川烏附子生白朮茯苓木香黑豆皮曹三八陰火喉痹滋腎丸李四四勞必疝墜按之有聲而解是虛而氣乘非因寒也閲所服之藥半屬辛熱不知質偏精血內空法當攝固不必偏熱偏寒熟地茯神炒遠志線魚膠柏子仁五味子紫胡桃肉沙苑子管六七少腹有形六七年漸加腹滿述臨暮納食夜必腹鳴瘕泄蓋老年坎陽日衰坤土不運濁陰下聚凡冷滯肥膩食物宜忌勿預家務怡悅情懷以為卻病之計若徒恃醫藥非養生之法矣人參菟絲子葫蘆巴茯苓舶茴香上肉桂補骨脂砂仁金鈴子肉果山藥糊搗丸吳十七脅中刺痛血逆心中漾漾隨嗽吐出兼有嘔惡腹痛此笄年情志鬱勃陽氣多升絡血逆行經水不下恐延乾血重症山楂桃仁柏子仁丹皮延胡益母草張二十暑入心胞煩熱多驚舌苔黃而不渴連翹犀角尖益元散大竹葉石菖蒲川貝周二四先開稟薄壯盛精氣不足形神勞動陽乃浮越精血皆有形非旦夕可生培養無形元氣可生有形之精血勿誦讀煩心勿搖精動腎靜養百日壯年可以生復兩儀煎孔四六頭風傷目是內起之風屢投發散清涼藥不對症先傷胃口仿內經辛苦急食甘以緩之枸杞子桂圓肉茯苓炒熟半夏楊四一肝風化熱犯胃噁心痞悶食入作脹口渴議養胃制肝人參金石斛烏梅肉麥冬新會皮施坐不得臥胸滿氣喘暑風濕氣漫處三焦太陽膀胱不開邪郁生熱氣痹生腫先議開三焦氣分之窒杏仁白蔻仁滑石寒水石豬苓廣皮厚朴茯苓皮王六一拮据勞形操持勞神男子向老下元精血先虧陽失交護浮越上冒致耳目清空諸竅不爽凡下虛者必上實此非風火由陰不配陽使然虎潛丸李十九肌柔色白形氣不足當知識年歲龍雷突起無制干嗆咳逆情萌不遂有夢遺精見熱理嗽清熱胃減墮入虛勞能知命靜養冀其漸次充復三才湯加蓮肉芡實茯神柏子仁姜五八痢已八月久痢自必傷腎下失收納據述泄氣糞通稍爽非寒膩固澀所宜用景嶽理陰煎唐二十陽浮汗泄衄血皆下焦真陰不充適值乘龍之喜與病相悖議填實下元之陰制伏浮陽熟地萸肉五味女貞子旱蓮草茯神秋石黑殼建蓮蜜丸王三九瘧邪流入肝絡莖舉寐中夢擾熱逼筋骨液傷痠痛正虛邪伏滋養不效生鱉甲生地胡黃連丹皮黑山梔青黛計四一酒客內有濕熱瘍膿初愈精神未復小暑泛潮外濕與內濕併合致傷脾胃之絡便血繼以吐血久延肉消神倦然脈絡之濕蒸熱蘊仍在此病邪為本虛為標非補澀藥所宜茵陳茯苓皮厚朴廣皮海金沙雞肫皮大腹皮楂肉砂仁殼王二六目患其來甚驟醫投風藥寒涼漸起翳障眵肉欲遺未泄已見淋濁陰虛弱質暑濕熱氣直入於陰經非欲速易愈之症石蟹苦丁茶金石斛桑白皮飛滑石乾荷葉夏枯草顧十五稟質聰慧當此已有知識勤讀夜坐陽升則上熱下冷真陰不能生旺長夏變幻腹疾以溲濁痹熱論之乃虛人暑伏脾胃議用東垣法人參煨葛根廣皮黃柏生穀芽澤瀉茯苓川連胡三一形質偉然吸氣不入是腎病自言心緒少適六七年久藥無效近來納食不運夜必驚惕而醒先以兩安心腎鎮怯理虛人參茯苓龍骨小麥炙草金箔顧四八凡寒濕痹久則變熱六氣客邪悉從火化邪客軀殼節骱熱氣還蒸諸竅膚腠癮疹搔癢忌食酒肉方可向愈羚羊角犀角殭蠶粗桂枝花粉白蒺藜錢五一中年食入涎沫上壅吐食此屬反胃姑以淡薄滋味清肅上氣平昔飲酒惡甜藥不宜重以損胃鮮枇杷葉杜蘇子降香橘紅蘆根苡仁張二四上年産後至今夏經轉寒凜遂結氣瘕自少腹攻至胃脘脘痛氣結宜開先用金鈴子散延胡金鈴子青蔥管山楂生香附蓬莪朮沈十一平素飲食少用已見脾胃不和暑濕熱氣從口鼻入幕原受邪邪氣蒸搏口舌疳蝕脾營胃衛異氣混受遂為瘧潮熱稚質純陽微冷熱勝當以廓清三焦蘊伏而脾胃最為衝要飛滑石大竹葉杏仁厚朴廣皮白茯苓皮白蔻仁方三二正在壯年交四月陽氣升舉忽然跌僕無知頭搖肢搐越旬又發問病因忿怒所致大凡病來迅速莫如風火鬱怒由肝膽木火生風從此而發癇厥若僅謂痰火用辛香燥劑劫痰利氣宣竅厥陽不寧病奚得減龍薈丸每服二錢四服陳六二酒濕熱氣氣先入膽濕著胃系痰聚氣窒絡血瘀痹痛在脘忽映少腹氣血交病先和少陽陽明之陽酒客惡甜治以苦辛寒土蔞皮半夏枳實川連生薑周五五陰虛質弱風溫濕溫皆邪在氣分汗散傷液邪入心營神識昏昧肢節微痙仲景痙濕暍萃於一門小溲不利有三焦阻閉之危飛滑石鮮菖蒲根茯苓皮川通草寒水石廣皮煎藥化服牛黃丸許四一暑濕皆氣窒成瘧初起舌白嘔吐乃太陰脾病誤用寒涼滋柔陰藥助其濕邪引邪入營舌赤不喜飲水何從氣分開其結逐其濕仿古腎治瘧務在通陽茯苓一兩囫圇厚朴草果仁半夏新會皮高良薑衝入薑汁五分蔣上年久暖少寒冬不藏固花甲已外腎真既虧水不涵木肝陽化風勃然上泛遂令眩暈經云下虛上實為厥乃欲僕中之根萌也此非外來六氣所感由操持縈思五志之陽劇升煩動在裡營血脂液暗耗診脈左尺空弦望色浮紅光亮欲便用力汗泄漐漐偶爾立起則足跗骨痿色脈見症顯明彰著閲所服諸藥未參內典聖訓昔劉河間內經奧旨凡上實下虛耳鳴足痿便溺竅阻等症每以濁藥清投名曰飲子宗是議主治制熟地肉蓯蓉炒遠志柏子仁川斛天冬五味淮牛膝劉山西泄瀉二年食物不減胃氣未損脾陽已弱水濕陰濁不易輸運必須慎口勿用寒滑厚味議用暖中佐運法生茅朮生於術炒香菟絲子茯苓張瀉血八年腹左有形梗痛液耗渴飲肝風大震腑氣開合失司溲溺不利未可遽投固澀茯苓木瓜炒白芍炒烏梅澤瀉炙草許風濕熱爍於經脈右肢牽掣邪未驅盡發為瘡疾有年陽明脈空遂致偏痿生黃耆歸身防風丹皮木防己黃柏銀花沈背寒鼓栗而後發熱二便頗利並不渴飲入暮倚枕氣自下衝嗆咳不已脈空大按之不鼓肌消神鑠是煩勞抑鬱傷陽寒熱戌起醜衰解時無汗非外感表病顯然溫養營分立方參入奇脈宗陽維為病苦寒熱之例川桂枝鹿角霜當歸炙草生薑南棗又進通和營分兼走奇脈二劑寒熱已止而操持煩心皆屬傷營耗氣未免滋擾反復經謂心營肺衛之虛都是上損立方不越益氣養營矣人參茯苓廣皮炙草炒白芍當歸棗仁生薑龐久損精神不復刻下土旺立春大節舌碎齶腐陽升陰不上承食不知味欲吐下損及胃最屬不宜人參炒麥冬紫衣胡桃肉熟地雞子黃茯神褚氣鬱肝不疏泄神狂譫語非是外感乃七情之病先進滌痰湯法川連膽星石菖蒲半夏鉤藤山梔遠志橘紅方風溫上受心營肺衛皆熱氣不宣降則痞脹熱熏膻中則神迷此上焦客邪想有酒食內因之濕互相挾持七八日未能清爽以梔豉湯主之山梔豆豉杏仁鬱金蔞皮鮮菖蒲郭小姐診脈左徑似數右寸虛大中下虛濡面色㿠白少寐消渴納穀最少經候不至已十四月上年夏秋間頭面肢體曾發風疹此屬血液內奪陽動化風以和肝清熱得安今思藏血統血固在肝脾必得陽明脈絡充旺斯血海流行稱職議甘補佐以兩和方意人參炙黑甘草歸身赤白制首烏茺蔚子酒炒白芍桂圓肉小黑穭豆皮潘下血純用苦寒幸得補陽救正陰陽造偏浮腫咳喘此藏聚失司當春升發泄之候宜通補攝納治其肝腎若耆朮呆補恐助濁凝有脹滿之變人參五味茯苓車前熟地炭炒杞子炒歸身巴戟肉袁脈濡面赤厄嘔吐自利此太陰脾陽受傷濁陰逆侮高年不可純消擬用理中法人參炒黃乾薑厚朴薑汁炒炒半夏又中下陽微嘔厄下利溫中不應恐延衰脫夫陽宜通陰宜守此關閘不致潰散春回寒谷生氣有以把握候王先生主議人參附子炮姜炒粳米赤石脂生白芍宋四七脈濡澀減食不運脘中常痛糞後血下如線按經云陰絡傷則血下溢閲前方補陰不應反滋脹悶蓋因不明經營操持多有勞郁五志過動多令化熱氣鬱血熱三焦失於宣暢若非條達氣熱焉望血止於朮炭枳實炭鬱金廣皮炒焦桃仁炒白芍炙草茯苓褚晨起未納飲食吐痰致嘔減谷胃陽傷也由多進知柏所致其苦寒胃先受傷矣先用小半夏湯加黍米席積勞氣血凝遏脘悶肋痹食減治以宣通脈絡桃仁當歸鬚鬱金柏子仁小胡麻桑葉桑芽膏丸施三五忽然神迷逾時自醒病起一年頻發漸近今診脈細弱必未實熱此因憂慮情志受傷手厥陰膻中之清真為濁涎所阻內因之病理難速攻姑以宣通神明兼理痰氣為治午服鮮菖蒲根天南星遠志竹節附子茯苓薑汁夜服白金丸徐三四聲音不宣痰出鼻竅上焦肺氣窒塞經營著急傷肺酒熱熏蒸亦主傷肺宜辛涼以宣之薄味以清之每日吃淡豆腐花一杯杷枇葉薄荷葉桑葉杏仁牛蒡子甘草午前服徐二十久病氣血膠結絡中不和攻補皆不去病仿古五積治例每以疏通緩逐為法不必峻劑雞內金海浮石蛤粉歸鬚桃仁半夏栝蔞實枳實山楂呂脈動如數按之不鼓便血自去秋大發今春頻發不已凡夜寐夢泄便血隨至平時身動吸促如喘氣衝咳嗆心悸耳鳴足肢痿弱不耐步趨種種見症顯然肝腎真陰五液大傷八脈無以攝固陰既虧損陽無有不傷此滋補原得安受嘗讀仲景少陰病治例有填塞陽明一法意謂脂液大去關閘皆撤而內風虛陽得以掀旋內擾屢投補陽暗風隨至聖人每以填塞其空似與內經腑通為補之義相左然關門不固焉有平期既驗之後再以血肉有情另佐東垣升陽之法安養調攝自有成驗先用方禹糧石赤石脂人參五味萸肉木瓜蒸餅為丸李先知曰下焦有病人難會須用餘糧赤石脂以土屬外剛內柔味酸質厚能填陽明空漏人參益氣生津合木瓜以入胃更味酸收斂液固陰以熄肝風蓋陽明陽土宜濟以柔不用剛燥慮其劫液耳前方用二十日後接服膃肭臍鹿茸家韭子補骨脂生菟絲子粉赤白茯苓暮夜兼進東垣升陽法人參黃耆熟術廣皮炙草炒歸身防風羌活獨活吳辛泄太過肺胃津傷咽喉乾涸出納氣阻蓋肺為出氣之臟姑進滋養上焦以充化源生雞子白玉竹麥冬甜杏仁生甘草嚴填陰則陽和風熄雖已獲效春分後診左脈垂尺已減右脈弦恐夏熱氣泄有減食神煩之慮早上仍用前方晚進戊己法仿仲景肝病實脾之意人參熟術茯苓炙草廣皮白芍方飢不欲食氣衝咽嗌頭眩寒熱汗泄皆肝陽升動太過若加怒勞恐有暴厥之慮川連烏梅人參牡蠣生白芍炙草包熱灼耳鼻諸竅皆癢浮陽化風上擾汗多不渴飲此非氣分實火鎮固不應法當攝補三才湯合參麥散主之葉四三鬱怒致病心胸映背痛甚至氣阻咽喉呼吸有音吐涎沫又不熱渴由肝病蔓延所傷非一經矣先理上焦與苦辛輕劑鮮枇杷葉香豉苦杏仁鬱金栝蔞皮黑山梔何三一臍流穢水咳嗽腹痛欲瀉詢知勞動太過陽氣受傷三年久恙大忌清寒治嗽法當甘溫以治之黃耆建中湯去姜陸五二服腎氣湯得效是下焦陽微致神氣冒昧吸不得入為喘溫補收納一定成法人參熟附茯苓車前紫衣胡桃肉姚脈左弦肝風犯胃水穀下咽即嘔經月不愈胃氣大虛泄木必兼安胃人參川連黃柏川楝子川椒桂皮烏梅生白芍潘眉心痛心中熱腰脊酸瘦五心皆熱自産後半載形消食減乃下焦陰液大耗而肝風挾陽震動矣病自內損固當補益然閲所服方藥雖曰養陰半投芎柴辛散是昧於根蒂已虛雜用升泄恐咳喘躁厥至矣生地阿膠生白芍麻仁炙草麥冬羚羊角磨汁伍崩淋已久少腹結瘕液涸氣墜辛甘溫潤之補冀得宣通勿謂崩症徒以澀藥淡蓯蓉杞子柏子仁郁李仁冬葵子歸身任奶奶風溫乃手太陰肺病與傷寒足經不同輕劑恰合治上無如辛散消克苦寒清火劫損胃汁致嬌柔肺臟一傷於邪再傷於藥氣鬱不行壅塞喘咳不飢不飽此胃氣已逆旬日以外當甘涼生胃津少佐宣降不宜重劑玉竹霜桑葉大沙參生甘草甜杏仁甘蔗汁方脈形濡弱形寒汗出頻吐涎沫三日來寤不能寐此胃中虛冷陽氣困憊法當溫中佐以運通宣導寒涼斷勿輕投丁香皮益智仁半夏茯苓廣皮煨姜錢腑陽不通肝失疏泄至腹痛便難咽阻目赤此酸苦泄熱以通陽竅仿前賢龍薈遺意陽和風化腸垢始下脈雖小安而舌乾少寐陽明胃汁未充仍宣甘寒為主以性躁肝急脾胃易虧也生地阿膠麻仁炒麥冬生白芍茯神洪勞心營耗風火交熾飲啖酒肉濕熱內壅絡虛脈實肉腫如痹當此小滿陽氣大泄一陰未復致內風挾陽上巔耳目孔竅不清舌苔黃厚並不大渴雖與客熱不同但口中酸濁吐痰酒客不喜甘藥議進滋腎丸王風溫上腫氣窒不飢仍從上治活水蘆根兜鈴白蔻仁杏仁大豆黃卷生苡仁乾蟾丸五丸李溫濕熱蒸傷脾胃身熱泄瀉黃芩生白芍滑石豬苓俞穢濁纏染口鼻吸受時序雨潮之濕亦屬不正異氣此芳香開氣淡滲利濕一定成法白蔻仁藿香根嫩竹葉杏仁大豆黃卷厚朴滑石廖脈細自痢瀉血汗出淋漓昏倦如寐舌紫絳不嗜湯飲兩月來悠悠頭痛乃久積勞傷入夏季發泄陽氣冒巔之徵內傷誤認外感頻投苦辛消導大劫津液少陰根底欲撤陽從汗泄陰從下泄都屬陰陽樞紐失交之象此皆見病治病貽害不淺讀長沙聖訓脈細欲寐列於少陰篇中是攝固補法庶可冀其散而復聚若東垣耆朮諸方乃中焦脾胃之治與下焦少陰無預也人參禹糧石赤石脂五味子木瓜炙草此仲景桃花湯法原治少陰下痢但考諸本草石脂餘糧乃手足陽明固澀之品非少陰本臟之藥然經言腎為胃關又謂腑絶則下痢不禁今腎中陰陽將離關閘無有所以固胃關即是攝少陰耳薛奶奶疝瘕痛在少腹左旁病傷厥陰絡脈宗仲景法當歸三錢生精雄羊肉切片漂去血水生薑一錢炒黑小茴香一錢徐目黃脘悶汗多嘔吐濕勝症屬脾瘧厚朴炒半夏草果藿香根白蔻仁袁頭旋目暗心悸不渴不飢勉強進食二便自通不致脹阻病經臥床一月東垣云久病不知飢飽不見皮枯毛瘁乃痰飲為患當陽氣上升時令恐延痰厥炒焦熟半夏枳實高粱米茯苓薑汁華戊申三月草一日起恙至四月初一日診脈虛促舌微腫心悸神恍惚遂肌麻痹遺泄晝夜臥不成寐腰以下痿軟不勝坐立此屬陰液素虧值春夏之交陽氣發泄陰乏戀陽加以步趨嗔怒都令五志中陽大動誠如內經煩勞則張精絶闢積於夏令人煎厥薄厥之謂蓋張指陽氣之弛張精絶謂真陰之內奪木失水涵肝風大動皆為厥之因也法宜味厚固陰甘緩和陽內風熄可冀悸定安寐倘執方書不寐投以溫膽湯或畏虛亂補是不明陰陽臟腑之先後矣人參一錢半茯神三錢真阿膠二錢麥冬一錢生牡蠣三錢龍骨三錢生白芍二錢細甘草炙黑一錢又己酉歲正月初九日診夢寐欲遺丸方人參二兩熟地四兩河車膠一具五味一兩半覆盆子一兩半菟絲子一兩半茯神二兩湖蓮肉二兩遠志一兩山藥粉和丸周病小愈即食腥滯黏膩之物胃陽尚弱穢濁痞結中焦不運陽氣不行大便七八日不更衣舌自涎湧鼻覺氣穢清濁混亂所服之藥半系辛寒不究陽傷致纏綿逾月先用來復丹每服一百粒薑湯送下汪日前議味淡輕揚少佐微辛正合經言肺欲辛之旨然發表之辛則升開泄之辛則降夫肺主一身之氣清空之體義不受濁前云穢瘴上入肺位最高受戕最先因失治而漫延中下內經色診謂從上病者治其上斯源清流潔矣水蘆根白通草山茵陳生苡仁浙茯苓桑皮研入白蔻仁末臥時服威喜丸二錢又濕阻經絡為痛初在虛里穴漸延肋背附骨日來背部發現濕症微微紅色此濕邪由氣及於血分丸藥攻滯僅走腸中未能引經宣通所用氣分肺藥咳喘濁痰已緩今經絡久痛當以三因痹症參看制蒺藜通草木防己炒焦半夏生苡仁浙茯苓炒熟石膏陳大雨潮濕下痢都是陰寒服黃連陽傷䐜脹繼雖用溫又是守中今二便不爽脹必兼痛腑為陽陽宜通通則濁陰不聚痛脹自減大針砂丸每服一錢二分金娘娘少腹酸郁不和據述因寒濕而起緣産後精采不復衝任已空蹺維不攝經言陽維為病苦寒熱矣若云瘧邪焉有三五日休息而至蓋脈絡空乏須填補孔隙區區滋清之補與産後奇脈之病迥殊故不獲效人參紫石英炒歸身鹿角霜炒杞子茯苓接服斑龍丸加參舒口鼻觸入臭穢濁氣蒙閉心胞遂心胸痛嘔瘀血且欲昏閉即方書中惡之症蘇合香丸能闢穢惡之邪若誤認陰症擅投桂附則抱薪救火矣蘇合香丸二丸張小姐時時驚恐不食不便狀如神附頭面肌浮舌強唇腫寤不能寐夜多妄言經少紫黑此五志煎厥風陽上逆仿俞氏治楊季登女例用龍薈丸三錢吳厥陰頭痛舌乾消渴心下煩痛無寐多躁少腹脹滿小溲滴瀝時時痙搐最怕厥竭阿膠鮮生地雞子黃小黑穭豆皮煎半盞送滋腎丸二錢顧幼稚哮喘由外來風寒必從肺治因過食甘膩必兼理胃久發不已病氣蔓延不獨在肺胃間矣故因勞致發遇冷而發乃衛陽已虛煩動火升面赤皆腎陰內怯雖非色欲之損然因病致虛也須知病是有餘體屬不足不可徒用攻痰逐氣取快一時當未發之時病機潛伏只宜培土以運痰土旺則肺氣充壯水納氣以益腎子氣充長母氣自強此為子母相生之治守之日久發作自緩況宿病無急攻之法或寓攻於補或攻補互施然寒暄飲食調攝於此症尤當加慎早上服補納腎氣方薑汁製熟地生白芍懷山藥丹皮雲苓紫衣胡桃肉咸秋石澤瀉蜜丸桐子大午後服健中運濕方人參熟半夏新會皮茯苓枳實地栗粉金石斛湯法丸王濕鬱熱蒸必陽氣鼓運濕邪乃解是寒戰後身痛已緩蓋濕從戰而氣舒戰後陽氣通和為身熱汗出耳但脈濡神倦餘邪未盡正氣已虛有轉瘧之象用大半夏湯通補陽明人參半夏茯苓薑汁蘇早食暮吐大便不爽病在中下初因勞傷胃痛痰瘀有形之阻桃仁半夏韭汁枳實姚老年伏氣溫邪五十日不解脘痞不飢心中脅內獨熱藥下咽則嘔痰多厄逆舌焦微渴四末微冷此胃傷已極久乏穀氣致津液不復氣機鬱悶用藥須忌苦燥辛溫妨胃先議芳香輕清兼以穀氣開醒上中香梗露香櫞露玫瑰露銀花露米漿劉瘕聚攻觸中脘心痛映背嘔吐涎沫凡久病病必在絡絡空必成脹滿已經旦食苟安暮食痛嘔其胃中清陽久失旋運之司飲食尚助嘔脹焉能承受湯藥病退無期頗為棘手閲古方書於久病有形通劑是議先擬通陽改投小丸一味阿魏丸硃砂為衣服五分張形寒手足痛肌肉漸腫勞力行走陽氣受傷客邪內侵營衛失和仿局方痹在四肢汗出陽虛者與黃耆五物湯黃耆桂枝茯苓炙草當歸煨姜南棗胡胸臆不爽食入內脹糞後便血病已二年診脈左小澀右微弦食減形瘦是內傷悒鬱初病在氣久延血絡而瘀腐色鮮血液皆下從怒勞血鬱治桃仁杏仁柏子仁歸尾紫菀冬葵子費臍下有形攻觸氣上則嘔吐降下則失氣脹消腹中必有濁滯阻塞椒附難投僅能開無形陰濁老年陽衰不可遽投攻下用半硫丸一錢俾腑陽流通滯濁自去丁脈右弦脘痛映背得嘔痛發氣鳴痛緩乃胃氣少降寒暄七情皆令痛發病屬肝胃議河間金鈴子散金鈴子延胡炒半夏薑汁茯苓橘紅杜酒客胃中釀熱嗔怒亦令肝陽犯胃今納穀脘中微痛乃陽逆失降酒家忌用甘膩辛苦清降平肝和胃治之川連吳萸半夏薑汁茯苓橘紅竹瀝王清明穀雨氣候已暖所感溫邪從口鼻吸受自上及中為三焦病羌防乃散足太陽風寒表邪溫病篇云誤用辛溫表散即為重劫津液今頭身痛咽痛心胸煩悶視其舌心灰黃邊紫絳渴飲不能下咽斑疹隱隱津涸呼吸漸閉所謂一逆尚引日再逆促命期矣重症之尤勿與目下時行客邪同視玄參連翹銀花白金汁沖大豆黃卷飛滑石象貝川通草錢肝藏魂因怒則諸陽皆動所見病情皆屬陽動化風而為厥故凡屬厥症都隸厥陰考內經治肝之法不外辛以理用酸以治體甘以緩急今肝陰素虧之體驟加暴怒病已浹旬液涸陽亢急急鎮固收攝猶慮弗及閲所服諸方僅以泄肝為用平肝為事膚淺庸劣一至於此不知補法都以子母相生同治蓋壯水則木得滋榮陰充則風陽自熄醫不師古尚敢稱虛道實耶生地阿膠麥冬人參金箔生雞子黃謝瘧熱傷陰心腹中熱浮陽升降鼻衄汗出遺精便難此因瘧加病久臥氣機呆鈍食入難消然調脾胃之藥皆氣勝助燥施於液虧體質於理有悖焦穀芽生地炭炒知母制首烏鱉甲白芍服二劑後接服後方谷露人參麥冬鮮生地北五味汪久遺溲溺淋瀝三年下焦常冷脊膂腰髀疼楚如墜此腎臟虛寒但填精固澀多進不應是督任三脈失司黏膩澀藥未能走入奇經仿孫真人九法中採用鹿茸補骨脂家韭子蛇床子生菟絲子覆盆子金櫻子瑣陽生杜仲炙草茯苓黃精羊內腎青鹽共為丸蔣病已三載仍然能寢能食諒非臟腑虛損自述冷氣或聚胸臆或貫脅肋水飲下咽汩汩有聲氣得下降宛若病去此必支脈結飲久久阻遏氣隧流行決非重墜攻逐以及溫補膩濁可治蓋脈絡為病非辛香何以開鬱議宣通氣血方法降香枇杷葉鬱金橘紅蘇子桔梗苡仁桑葉淡姜渣金動氣兼有遺精已是下焦陰陽虛損況久病欲進溫養必須通攝桂附氣雄而剛非下損藥也淡蓯蓉補骨脂胡桃肉生菟絲子覆盆子家韭子舶茴香茯苓安脈小數色蒼心痛引背脅肋皆脹早上牙宣齦血夜寐常有遺泄此形質本屬木火加以性情動躁風火內燃營陰受劫故痛能進食歷來醫藥治痛每用辛溫香竄破泄真氣不知熱勝液傷適令助其躁熱是經年未能痊期議以柔劑熄其風緩其急與體質病情必有合窾之機細生地阿膠牡蠣玄參丹參白芍小麥南棗季秋瘧愈未復原冬季連次感觸溫邪老年平素有痰嗽本恙溫風爍肺氣劫胃汁致痰多咳甚欲嘔脈數倏熱右脅常痛火色升於右頰由胃津漸傷肺不主降而升騰莫制古稱肺乃柔金胃為陽土已經百日纏綿開提半屬苦辛辛泄肺氣苦再傷胃致不思納食議甘藥濡胃潤肺胃汁自充肺氣自降土旺生金古賢定法玉竹麥冬花粉甜杏仁橘紅蔗漿秦老年腫脹四肢俱冷皆陽氣衰憊濁陰僭踞蓋脾陽主運腎陽司納今食入愈脹二便不爽中下之陽消乏豈可小視此病炮黑附子淡乾薑生白朮生厚朴茯苓澤瀉尤由肝氣升舉犯胃胃逆不降幽門不通旁趨為脹數月久延氣分已入血分桃仁郁李仁降香歸鬚川楝山梔嚴兩寸脈獨搏不飢不食上焦氣分之阻時當仲夏必有濕熱客氣內伏半夏曲栝蔞皮滑石黃芩通草杏仁
