四錢烏梅肉五分上共為末將烏梅煮爛搗丸每服三四十丸空心黃米湯下治久痢虛滑不禁可以實腸裡急後重腹痛者不可服用臭椿樹皮根切碎酒拌炒為細末用真阿膠水化開和為丸如桐子大每服三五十丸空心米湯下治久痢初起者不可服松花三錢地榆二錢乾荷葉二錢臭椿樹根皮一兩取向東南者去外粗皮上為細末白痢紅糖調紅痢蜜調紅白相兼蜜與糖調加溫水少許每服二錢忌麵食葷腥油膩等物又烏梅四個煅略存性白滑石淘淨二錢臭椿樹根皮一兩取在土者剝淨皮曬乾為末上用陳米飯搗為丸每服四五十丸空心米湯下治痢方不拘赤白泄瀉痢至八九年者三四服即愈香薷二十兩藿香十兩蘇葉七兩五錢木瓜五兩檀香二兩五錢木香二兩赤苓五兩甘草一兩五錢厚朴五兩枳殼五兩上為末蜜丸彈子大約重二錢每服一丸白痢淡薑湯下紅痢木香湯下其餘開水下治久瀉久痢方陳石榴皮酸者焙乾研細末每服三錢米飲湯下患二三年或二三月百方不效者服之即止不可輕忽治休息久痢但痢而後無重痛者用壯大豬小腸一條不落水將箸頂翻轉出腸中油膩穢濁刮下但將刮下之物在瓦上炙焦乾存性研末用砂糖少許空心調服一條腸垢大者分作二服小者只作一服若翻轉腸內有糞先去其糞但刮其近腸之血膩油垢炙用重者吃兩三條腸垢必愈治赤白久痢腹中不痛者桂圓七個粟殼七個荔枝七個建蓮七粒去心水二碗煎八分空心服朝服可以一日晚服可以一夜不痢親驗良方治毒痢方下膿血者是金銀花一兩煎湯送香連丸三錢脫肛潤腸散治痢後脫肛鱉頭灰五倍末伏龍肝生礬末赤石脂訶子肉各五錢俱曬乾上為極細末蔥湯洗淨摻於腸頭上頻頻換之以愈為度治脫肛方名倍礬煎五倍子三錢白礬少許上為末水一碗煎湯洗之立效若婦人産後脫肛五倍子末摻之縮肛散鱉頭一個煅枯礬三分五倍子煅三分共研極細摻之又用爬牆草煎湯溫洗浸肛隨浸隨縮上此草地上生根一路沿牆而上者但有二種一種葉大似絲瓜葉者不可用須小葉如茶匙樣光亮者痔漏縮痔祕方內痔落下用大團魚頭一個火煅為末搽痔上即刻收進親驗治外痔疼痛坐臥不得者大田螺八九個將針挑開靨蓋入冰片白礬末少許在內以螺尖埋土中令其蓋仰上經一宿取螺水以雞毛搽痔上六七次即消愈熏洗痔方五倍子三四個皮硝一撮水二碗煎濃先熏後洗一二次即愈絶妙治痔漏丹方名長明酒用積年舊琉璃燈洗淨油膩火煅研細以紅酒服四錢不過七日其管自去點痔方銀硃三錢大雄黑背蜒蚰三條共搗爛用鹽泥封固作團要留一孔火升煙盡為度取出用田螺水調搽即縮上不用銀硃將上好黃丹拌之亦效又蜒蚰一條冰片五釐膽礬二釐和化蜒蚰水點之止痔下血方蜒蚰一條用鹽泥裹煨通紅去泥用硼砂硃砂雄黃冰片共為極細末入龍骨少許更妙大便時乘其脫出以細草紙盛藥少許托之使入大效治痔漏方新象牙屑二斤為末每早用熟雞子三個將牙末和吃或入稀粥內吃亦可服盡一料自愈又露蜂房一大個每孔入鹽填滿煅存性殭蠶二錢蟬蛻木香各二錢象牙末豬胰油打爛豬懸蹄蜜炙各五錢白頸蚯蚓用石壓去血陰陽瓦焙乾淨末一錢上共為細末用黃占半斤溶化將藥漸入搗勻為丸如棗核大每服一丸空心好酒送下連服三丸瘡口自消隔一日第五日再服一丸第七日再服一丸痔管自退出矣將玉簪花根三段三日搗爛搽上自愈又名蛭蟾丹螞蝗十數條將黃泥做成小管如筆管大入螞蝗在內上以瓷黃泥塗護之以鐵絲捆緊外再以鹽泥封固炭火煅以煙盡為度取出去火毒為末二錢蟾酥一錢熊膽八分麝香五分冰片三分看漏淺深用飯粒為條插入盡頭久者五六條近者二三條其管化為膿水用洗藥洗方烏桕樹根皮枸杞根皮槐花五味子水楊樹杆須瓦花黃柏荔枝草上煎湯一大鍋先熏後洗再以十寶丹收口十寶丹方龍骨八分象皮七分琥珀六分血竭五分黃丹五分冰片四分珍珠二分腐煮牛黃二分乳香沒藥各一錢三分共為細末收貯聽用痔漏退管方象牙末二兩人腳指甲炙五錢牛骨腮炙一兩豬腳格炙一兩刺蝟皮鍋內蜜滾炙乾上為末再將地榆槐角二味入豬臟內煮熟搗爛共搗蜜丸每服三錢空心滾湯送下其管自出半月即愈又白鴿糞一升放罐內以滾水衝入罐中乘熱病人坐於罐口上熏之其管自落數日即收口要坐久忍痛又用豬臟頭水煮爛或鹽或醬油蘸吃每日吃一個吃至二三百個必愈若脾胃畏油膩者只吃近肛門處管一段亦可再每日切荸薺蒂一片吃數片二物常兼吃更妙又金余即人手指甲銀余即人腳指甲二味不計分量均在黃沙內炒脆真血餘二兩血珀五錢黃牛角腮火煅四兩羊角腮火煅四兩新象牙屑烘三兩豬懸蹄殼火煅四兩蟹爪尖炒一兩蜣螂蟲瓦上煅四十九個刺蝟皮二張刮去毛黃沙內炒陳松蘿茶葉烘三兩穿山甲先用醋炒再用酒炒四兩槐角子炒四兩青黛用水淘淨五錢地榆炒一兩以上十六味如法煅煉為細末用黃犬大腸煮爛加煉老白蜜為丸如無犬腸以豬臟代之亦可空心淡鹽湯送下三錢壯盛者加或至五錢虛人桂圓湯下痔漏插藥方百草霜黃連各二錢半冰片五分麝香二分蜣螂蟲旱蓮草頭五錢炒螞蝗十五條瓦上焙乾共為細末丸如粟米大入管口自進藥三日後待管自化出用長肉收功末藥收功末藥方輕粉乳香麝香韶粉東丹血竭共為末摻之又雄大蜣螂不拘多少陰乾生研加冰片少許將綿紙捻作條用白芨水蘸濕曬乾待硬再蘸濕染藥末於紙條上量漏孔淺深插入漸漸生肉其條自然退出用剪刀剪去外一段即滿靨矣治痔漏丸方刺蝟皮大者一張小者二張新瓦上炙脆為末象牙屑一兩緑豆粉一兩青黛三錢槐花末一兩五錢陳細茶五錢上共為末用陳四糙米煮爛飯和藥打為丸每服三錢金銀花湯送下一料不效二料永不再發治多年頑漏神驗方用大腳魚一個再取上好冰片三錢鐘乳石五錢俱研極細末放入腳魚口內放完將腳魚扣住腳倒挂三四日待腳魚頭腫大取快刀殺下頭來用陰陽瓦兩塊對合將魚頭裝入瓦內放炭火上兩頭將鹽泥封固瓦上留一小孔出煙待煙稍盡存性將小孔封固拿至地上俟冷打開研細用四五分好酒送下病重者兩三服其管自出再用長肉藥收功治漏疾祕方香菜油一斤以三十歲婦人血餘二兩入油內熬煎去渣每日用油一鍾煎雞子三枚將象牙細末三錢摻在內淡吃連吃三五日或將元米粉摻象牙屑攤餅吃亦可象牙末吃至一二斤再無不效此法不用刀針挂線有管自然退出屢試屢驗象牙要真更要新而雪白者鎊碎再用乳鉢細研腸風治腸風下血丸方槐花二兩一半炒一半曬為末柿餅七個去蒂烏梅十四個共打為丸桐子大每日空心滾湯送下即愈又末藥方扁柏葉一斤蜜浸一宿曬乾為末青州柿餅一斤炭火煅過為末上二味拌勻每服五錢空心陳酒送下極重者五六服可除根治血痔腸風方將龜肉煮爛吃一碗血即止其效如神治腸風並痔漏木耳一斤煮成膏再入豬肉三斤煮熟食盡即愈漏管自出治痔瘡下血方棉子仁四兩曬乾去油生研青州柿餅十二兩蒸搗爛百草霜四兩烏梅肉四兩蒸爛共搗為丸每服三錢白滾湯下或腐漿加青黛少許下更妙治腸風下血方青州柿餅三個火煅地榆槐米各炒五錢共研末分七服空心開水調服忌燒酒椒蒜芥又當歸身一兩懷生地一兩竹刀切片烘脆萸肉一兩真阿膠一兩將石膏二兩研碎和炒成珠去石膏不用候冷研為細末棉子仁一斤燎去外面花衣然後入鍋內炒至逐粒暴開並至焦黑存性真柿霜即柿餅上白霜也但假者甚多入口甘而涼者為真不可經火俟諸藥研末後方和入上逐味炒焦要如墨色又各要存性共研為細末和入柿霜拌勻每日空心服藥末四錢白滾湯一飯碗沖和將箸調末即半浮半沉連湯飲下若下血太甚臨晚再服三錢俟糞色變黑血漸止矣忌食胡椒燒酒辛熱之物有此病者終身宜戒此方修合之法不過極細極黑四字則藥末浹洽於臟腑所以要黑者血遇黑而止以水剋火五行之理也治腸風臭椿樹根皮四兩扎為一大把大茴香一大粒木耳四兩以雄豬肚子一個將藥俱裝入肚內扎好煮爛去椿皮但吃木耳肚子連湯吃完重者兩料必愈治腸風久不愈者臭椿樹根皮烏梅共煎陳酒沖服即愈治腸風青州柿餅一個內放白蠟一錢飯鍋上蒸熟食數次愈治大便下膿血即日夜數次數年久病皆愈雄豬大臟一條洗淨桂圓肉二兩新鮮白扁豆花四兩將二味同打爛用白糯米拌和裝入臟內兩頭扎住砂鍋內燒爛忌見鐵器然後將人中白炙脆研末蘸吃或醬油蘸吃亦可不論吃粥吃飯空口皆可吃吃四五條即愈治大便下血荸薺搗汁半鍾將好酒半鍾衝入空心溫服三日即愈治大便下血用涼藥不效者用歸脾湯加槐花黃芩治之自愈治大便下血虛弱者旱蓮草陰乾為末以槐花煎湯調炒米粉糊丸桐子大每日服五錢以人參五分煎湯下二服即愈溺血治溺血溺血者不痛而小便出血也痛者為血淋用頭髮燒灰研末每服三錢空心滾酒調下或用百草霜酒調服或用伏龍肝白滾湯調下夏月水調痛者用車前草絞取濃汁碗許入糖霜一二匙燉溫服之此可多服自愈初痛時用韭汁亦好或將亂髮灰糊丸桐子大每服七十丸空心開水下治男子莖中痛及婦人血結腹痛取牛膝一大握酒煮飲之立愈治小便下血用清利不效者用補中益氣湯加車前子治之自愈治小便下血立效旱蓮草車前子各等分將二味搗自然汁每日空心服一茶杯
