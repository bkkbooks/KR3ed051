body:
  text: 卷二公選良方內外科中風牛黃清心丸此藥專治痰厥昏暈不醒口噤痰喘及小兒驚風發搐五癇等症極效膽星一兩薑汁炒白附子一兩煨鬱金五錢川烏一兩面包煨半夏一兩皮硝湯泡五次皂莢湯泡五次礬湯泡一次曬乾為末上五味共為細末用臘月黃牛膽三個取汁和藥仍入膽內扎口挂風簷下至次年取膽內藥一兩四錢加度過芒硝水飛辰砂硼砂各一錢冰片麝香各一分研極細末和在一處稀糊為丸如芡實大金箔為衣薑湯化下治暴僕痰涎壅塞竹瀝一盞薑汁五匙調入白礬末一錢灌下治筋骨疼痛如夾板狀不可忍者用騾子修下蹄爪甲燒灰存性研末或黃酒或湯調服立愈治癱瘓祕方熟牛骨髓一碗熟白蜜一斤半濾過炒白麵一斤炮薑末三兩上四味和勻如彈丸大每日三四丸細嚼黃酒下大效又威靈仙蒼朮牛膝桂枝木通各一兩上為末黃酒五斤煮一炷香早晚服治雞腳風手足及指拳攣如雞腳狀疼痛不時發者當從鬼眼灸之左右膝骨蓋下兩邊各有小窩共四穴謂之鬼眼各將蘄艾灸三壯即愈愚謂以驅寒濕雷火針針四穴亦效補益奇想補心丸柏子仁二斤去油為末白朮一斤炒生地一斤焙紅棗肉三斤蒸熟上煉蜜為丸彈子大每日三服百日後百病消除棉子丸烏須黑髮暖腎種子陽虛人宜服此藥棉花子十數斤用滾水泡過放蒲包內悶一炷香取出曬裂殼口取仁並去外皮用淨仁三斤壓去油用火酒三斤泡一夜取起蒸三炷香曬乾故紙一斤鹽水泡一夜炒乾杜仲一斤去外粗皮黃酒泡一夜曬乾薑汁拌炒去絲杞子一斤黃酒浸蒸曬乾菟絲子一斤酒煮吐絲為度共為細末蜜丸桐子大每服二三錢養元固本暖腰方廣木香真川椒大茴炒故紙升麻各一兩川附子五錢蘄艾半斤丁香四錢上肉桂川楝子各一兩先將艾搓軟次以各藥為末和勻用綾絹做暖腰入藥密扎腰上著肉者神效腰痛神方雄豬腰子一付銅刀破開去中間血膜及外邊油膩青鹽炒二錢大茴一錢五分當歸一錢五分杜仲五錢去絲上為末入腰子內放瓷器中過一宿明早用韭菜上下鋪蒸熟用火酒洗去藥末將腰子用銅刀切片好陳酒空心送下多年者吃五六付乍起者一二付即愈又杜仲補骨脂牛膝香附各三錢青鹽一錢半將雄豬腰二對竹刀剖開去筋絲每個內外拌藥用濕草紙包灰火煨熟去藥酒下一醉即愈治下部無力雄豬肚一個紅棗肉半斤蓮肉四兩苡仁四兩將糯米半升填入肚內好酒一鍾醬油少許煮熟每日切幾片空心好酒下長春方治腎虛精冷之症魚鰾一斤蛤粉炒成珠極焦棉花子一斤取仁去盡油酒蒸白蓮鬚八兩金櫻子一斤去毛川石斛八兩沙蒺藜四兩杞子六兩菟絲子四兩五味子四兩炒將鹿角五斤鋸薄片河水煮三晝夜去角取汁熬膏和藥末為丸桐子大每服三錢歸圓酒方甘菊花八兩杞子一斤當歸八兩龍眼肉三斤上藥將火酒三斤酒釀十斤泡二十一用三仙酒方燒酒一罈十斤入龍眼肉十斤桂花四兩白糖八兩將泥封固愈久愈佳癆治吐血癆症桂圓七個紅棗十四個蓮子二十一個小黑豆四十九粒水二碗煎一碗空心早服連果吃完為妙治虛癆咳嗽吐血肺痿肺癰吐膿血垂危者服之即愈用茭白細根約三四兩搗碎將真陳酒煮絞汁每日服一二次至一二十日即愈治咯血吐血癆嗽久不止雪梨六十隻取汁二十杯生地茅根藕各取汁十杯蘿蔔麥冬各取汁五杯將六汁煎煉入蜜一斤飴糖八兩薑汁半杯再熬如稀糊則成膏矣每日用一二匙治酒癆吐血用雞距子一兩水二鍾煎一鍾不拘時服渣再煎服服至數十日愈盜汗治盜汗方蓮子七粒黑棗七個浮麥一合馬料豆一合用水一大碗煎八分服三劑愈又黃耆馬料豆二味煎服半月愈又五倍子去蛀末炙乾研末男用女唾女用男唾調厚糊填臍中外用舊膏藥貼之勿令泄氣兩次即愈止汗方黑豆三錢浮麥一錢烏梅一個煎湯服咳嗽治痰嗽諸虛奇驗方藕汁梨汁蘿蔔汁人乳薑汁白糖沙糖童便各四兩將八味放瓷瓶內用炭火熬煎只剩一斤為止每日空心白滾湯送下四錢服完即愈如能常服則精神強健永無虛損治小兒吼嗽並大人咳嗽屢驗方款冬花三錢晶糖五錢將二味放茶壺內泡湯當茶吃自然漸愈治小兒天哮一切風濕燥熱咳嗽痰喘兼治大人海浮石淨末四錢飛滑石淨末四錢甜杏仁淨末四錢薄荷淨末四錢上為極細末每服二錢用百部煎湯下治痰火骨蒸吐血不止之症重者十服八服即愈人參天冬麥冬二味去心各一錢五分茯苓五分杏仁二粒去皮尖紅棗二枚去核蓮肉六粒去心人乳二匙白蜜三匙大甜梨一枚銅刀挖去心將前藥制碎納梨內仍以梨蓋蓋之用綿紙封固飯上蒸熟日間吃其藥臨臥吃此梨治痰火方咳嗽吐痰面鼻發紅者一服即愈青黛水飛極細曬乾再研用三四錢蛤粉三錢二味煉蜜為丸如指頭大臨臥口噙三丸其效如神治痰火神水方一名玄霜黑鉛一斤煬成一薄餅中穿一洞以繩系之將好米醋半甕即以鉛餅懸挂甕中離醋約一寸許甕口用皮紙箬子扎緊再以磚石壓之勿使泄氣放屋下陰處待數日取起鉛餅上有白霜拭下每鉛一斤取白霜二兩為止其霜治噎膈每服五分噙口內以白湯送下若治痰火咳嗽每服三分照前法服治痰火方枇杷葉五十葉去淨毛水五十杯煎至五六杯再重湯燉至三四杯每藥三茶匙用蜜一茶匙調下立愈治老人上氣喘急嗽不得臥生薑汁五兩黑砂糖四兩用水煎二十沸時服半匙漸漸咽之治喘栝蔞一個明礬棗大一塊同燒存性研末以熟蘿蔔蘸食藥盡病除吐血治吐血不止用碗盛清水吐血在內浮者肺血也沉者肝血也半浮半沉者心血也各隨所見以羊肺肝心煮熟蘸白芨末日日吃之或只用白芨為末米飲調服亦效治吐血方吐血者偶吐一二日或不時吐之側柏葉濃煎和童便常服之又用藕節為末入炒蒲黃血餘灰等分調服之奇效又用雞子一個打開和三七末一錢藕汁一小杯陳酒半小杯隔湯燉熟食之不過兩三枚自愈赤白濁治赤白濁兼治夢遺名將軍蛋生大黃三分生雞子一個將雞子頂尖上敲損一孔入大黃末在內紙糊煮熟空心吃之四五朝即愈神奇祕方治色欲過度精濁白濁小水長而不痛者並治婦人虛寒淋帶崩漏等症生龍骨水飛生牡蠣水飛生菟絲粉生韭菜子粉上四味各等分不見火研末生乾麵冷水調漿為丸每服一錢或至三錢晚上陳酒送下清晨服亦可治遺精白濁有濕熱者生蠶砂研末每兩加生黃柏末一錢空心開水下三錢六七服即愈治白濁用頭生雞蛋五枚開一小孔每個入生白果肉二枚飯上蒸熟每日吃一個即愈治遺精滑失白龍骨研細一兩韭菜子炒一合上為末空心陳酒調服二錢小菟絲丸治女癆疸乃遺精白濁崩中帶下諸症石蓮肉二兩白茯苓二兩蒸菟絲子五兩酒浸研上為細末山藥糊為丸桐子大每服五十丸加至百丸或溫酒或鹽湯下空心服如腳膝無力木瓜湯下晚食前再服此方治遺精之聖藥屢用屢效但石蓮子陳久者難得治精氣虛滑遺不禁龍骨蓮鬚芡實烏梅肉各等分為末用山藥丸如小豆大每服三十丸空心米飲下治遺精方文蛤研細末以女兒津調貼臍內立止治一切淋閉白濁因火結莖中澀痛新鮮苡仁根搗爛絞汁一碗或滾酒或滾水衝入空心服二三次必效思仙丹治陰虛火動夢遺神方蓮鬚十兩石蓮肉十兩去內青翳並外皮芡實十兩去殼上為末再以金櫻子三斤去毛子水淘淨入大鍋內水煎濾過再煎加飴糖和勻前藥丸如梧子大每服七八十丸蠱治五臌神方蘿蔔子四兩用巴豆十六粒同炒牙皂一兩五錢煨去弦沉香五錢枳殼四兩火酒煮切片炒大黃一兩酒焙琥珀一兩上共為末每服一錢隨病輕重加減雞鳴時熱酒送下薑皮湯亦可後服金匱腎氣丸調理收功治水臌腫胖輕粉二錢巴豆四錢去油生硫黃一錢上研末做成餅先以新棉一片鋪臍上次以藥餅當臍按之外以帛縛之如人行五六里自然瀉下候五六次除去藥餅以溫粥補之久患者隔日方取去藥餅一餅可救二十人其效如神愈後忌飲涼水治水臌方陳芭蕉扇去筋燒灰存性五分千金子去油殼二分五釐滑石二分共為細末以腐皮包滾水送下十服全愈治水臌氣臌方活黑魚一尾重七八兩去鱗甲將肚剖開去盡腸入好黑礬五分松蘿茶三錢男子用蒜八瓣女用七瓣共入魚腹內放在瓷器中蒸熟令病人吃魚連茶蒜吃更妙此藥從頭吃起病從頭上消起如從尾上吃起即從腳上消起立效之仙方也治氣臌方將大蝦蟆一隻破開用大砂仁填滿腹中黃泥封固炭灰煅紅冷定去泥研末陳皮湯調服放屁即愈治氣臌氣脹方蘿蔔子二兩搗研以水濾汁用砂仁一兩浸一夜炒乾又浸又曬凡七次為末每米湯送下一錢立效治臌脹方四五月將黃牛糞陰乾微炒黃香為末每服一兩煎半時濾清服之不過三服即愈解脹敷臍方治一切臌脹肚飽發虛大田螺一個雄黃一錢甘遂末一錢麝香一分先將藥末同田螺搗如泥以麝置臍放藥臍上以物覆之束好待小便大通去之重者用此相兼小便大通病即解矣治中滿臌脹陳葫蘆一個要三五年者佳以糯米一斗作酒待熟用葫蘆瓢於炭火上炙熱入酒浸之如此五六次將瓢燒灰存性為末每服三錢酒下神效治臌脹方雄豬肚子一個入大蒜頭四兩加小檳榔砂仁末三錢木香二錢砂鍋內河水煮熟空心服豬肚立效又取舊葫蘆一個浸糞坑內一月取起挂長流水中三日炒黑為末每兩加木香末二錢每日空心砂仁湯送下二錢治肝氣方烏梅二個鮮橘葉三錢青鹽二分真川椒二錢上藥空心服痞塊治痞塊方不問男女左右癥瘕積聚瘧痞收取水紅花即水邊蓼半老穗頭連葉帶子曬乾不拘多少量用老蒜頭去皮膜同放石臼內打爛捏成餅曬乾為末每斤入蚶子殼煅灰研粉四兩再將老蒜打膏為丸桐子大每服百丸空心食後白湯下一日三服效治大人小兒痞積將水紅花子為細末以面和作一處少加麝一釐放痞上以尉斗烙之數次即愈又水紅花子熬膏入麝少許貼之亦效治痞塊用水紅花新鮮者同老蒜打爛量入皮硝一二兩捏成餅比痞塊大一圍放痞上用袱扎緊待乾再換則痞亦消又紅芥菜子即豬血芥不拘多少生薑汁浸一宿大約芥子一酒杯加麝香一錢阿魏三錢同搗極爛如膏藥攤青布上貼患處外用汗巾扎緊一宵貼過斷無不消又名藥豬胞麝香一錢阿魏三錢水紅花子大黃歸尾甘遂急性子甘草各五錢上為細末用豬水胞一個量痞塊大小用尿胞大小裝入乾燒酒半胞將前藥末放入胞內緊扎住口用白布將胞兜扎於患處俟塊化盡即去之不可遲也治痞塊八反膏鱉頭莧菜蔥蜜甘草甘遂芫花海藻阿魏鱉甲水紅花子上應為末者為末應搗爛者搗爛入末再搗如和不勻加燒酒調之先以水調白麵作圈圍痞上大六七分厚其藥敷在痞上外用錫注二把放燒酒在內尉痞上冷則更換至痞內動痛方止明日大便下膿血即除根治氣癖在小腹上攻衝心痛用穿山甲片土炒脆為末砂糖調陳酒送下每服三錢止痛如神如不能飲糖水調亦可化癖膏治塊如活鱉能行動諸藥不效者每日空心將靛花三四五匙沖熱陳酒內服至十日即不動服一二月即消盡矣外用敷之治大人小兒癖塊方甘草甘遂各三錢硇砂一錢木鱉子四個去殼莧菜三錢鱉肉一兩蔥頭七個上加蜜少許搗成膏以狗皮攤貼如藥乾用蔥蜜潤之二次即消治癖塊方腹中攻痛面黃肌瘦者愈有應驗真陳阿膠一兩蛤粉炒鬆研細九制陳膽星五錢人乳浸微火烘研川貝母一兩去心麝香四分忌見火鱉甲三個必要九骨七骨者佳真麻油