瘥切不可即飲熱湯又取扁豆葉搗汁一碗飲之立愈治傷暑急暴霍亂吐瀉方陳皮藿香各五錢上用土澄清水二杯煎一杯服之立愈急救霍亂吐瀉抽筋危症方不問轉筋霍亂令人偃臥將膝下腕內以手蘸溫水輕輕急拍直待紫紅筋現起用瓷鋒刺出血立愈此名委中穴在膝後對面治乾霍亂煎方上不得吐下不得瀉身出冷汗危在頃刻者食鹽一兩薑五錢切片同炒變色以水一大碗煎服吐出自愈不可熱服好後切不可遽吃飯食俟餓極後方可吃稀粥治乾霍亂方只一樣腹痛絞痛不可忍者切不可吃藥並熱湯水一吃即死將冷水一碗調入食鹽二三錢吃下吐則再吃多吃多吐則邪散而愈消渴玉泉散治消渴之神藥也白粉甘葛天花粉麥冬生地五味子甘草糯米上服一劑還津丸生津止渴霜梅烏梅各二十五個俱去核蘇薄荷末一兩冰片一分五釐硼砂一錢五分共研極細為丸每含一丸津液立至消渴潤燥方白蜜人乳酥各一斤上溶化一處每日不拘時服消渴方用繅絲湯飲之瘟疫闢瘟丹方此藥燒之能令瘟疫不染空房內燒之可闢穢惡乳香蒼朮細辛川芎甘草降香各一兩再加檀香一兩亦可共研細末棗肉為丸如芡實大神聖闢瘟丹蒼朮為君倍用羌活獨活白芷香附大黃甘松山奈赤箭雄黃各等分上為末麵糊丸如彈子大黃丹為衣曬乾焚之治大頭瘟方頭面腮際腫脹極大寒熱交作甚者崩裂出膿不可敷藥恐邪氣入內以至於死人中白即馬桶底下尿垢也火煅研末每服二錢白滾湯調服又將好青黛末白滾水調服二錢又只用馬藍頭一把搗汁將鵝毛搽上一日五六次熱氣頓出親驗真神方也治抱頭火丹即大頭瘟將扁柏葉搗爛用雞子清調敷神效治鸕鷀瘟方兩腮腫脹憎寒惡熱者外用赤豆半升為末水調敷或用側柏葉搗爛敷之內用薄荷濃湯熱服痧治痧脹腹痛方凡痧脹夏日多患此症面色紫赤腹痛難忍使飲熱湯便不可救即溫湯亦忌如遇此症速取生黃豆咀嚼咽下約至數口立刻止痛平人食生豆最引噁心止有痧脹人食之反覺甘甜不知腥氣此方既可療病且可辨症真奇方也沉香郁金散治痧氣寒凝以及腹痛沉香木香鬱金各一錢烏藥三錢降香二錢細辛五錢上忌見火生研為細末每服三分將砂仁湯稍冷送下痧藥方名火龍丹牛黃一錢麝香二錢冰片二錢硃砂二兩研飛蓽茇一錢真金箔一百張雄黃三兩研細火槍硝一兩硼砂五錢牙皂一錢各研極細端午午時合如痧脹腹痛將此藥嗅鼻中並放舌尖上吃下亦可又名蟾酥丸雄黃三錢麝香三分木香一錢丁香一錢以上俱不見火蒼朮三錢蟾酥一錢石菖蒲一錢炒山茨菰一錢半炒上共為末火酒化蟾酥為丸如粟米大硃砂為衣如難丸少加米飲每用二三丸放舌尖上化下加入西牛黃金箔端午日午時合尤妙又沉香鎊研細母丁香硃砂水飛雄黃以上各五錢廣木香一兩麝香三錢茅山蒼朮米泔浸去毛淨末二兩真蟾酥三錢上俱忌見火為細末各稱準分量將火酒化蟾酥為丸如丸不就少加米飲丸如粟米大每服二三丸放舌尖上化下神妙痧藥方北細辛三兩荊芥六錢降香末二錢鬱金一錢上共為末每用一茶匙放舌上冷茶送下或津唾咽下白痧藥方白胡椒一兩牙皂一錢火硝檀香末明礬丁香蟾酥以上各三錢北細辛二錢冰片麝香各五分金箔量加瘰癧內消瘰癧痰毒方未穿破者為痰核已穿破者為瘰癧三五個連者為痰串用羊角數對以威靈仙四兩共入瓦罐內加清水煮數沸候角軟取出切薄片用新瓦燒紅將角鋪上焙炒過研細每灰一兩加廣木香一錢白芥子三錢共為末煉蜜為丸用檳榔煎湯下或夏枯草湯下亦可服至七日後大便下如黑羊屎小便出黑水自消婦人如爛開兩脅服之亦效忌生冷煎炒房事內消瘰癧應驗方土貝母白芷各五錢共為末糖霜調陳酒下三錢重者三服愈治痰核方半夏末川貝末各一分用雞蛋大頭穿一孔不破內膜入藥在殼內膜外虛空處如虛人再加入參末三分和入以紙封固豎飯鍋內蒸熟吃之每日一個久之自愈又每雞子一個入貝母末三匙照上法蒸熟夏枯草湯或銀花湯下取癧核法名提癧丹水銀硼砂火硝明礬皂礬食鹽各一兩硃砂二錢用粗瓦盆放前藥上合粗碗一隻鹽泥封固炭火煉三炷香先文後武冷定取出升在粗碗上藥白米飯搗丸緑豆大硃砂為衣每用一丸放瘡上棉紙封二三層一日夜急揭起則核隨紙帶出丸可再用治瘰癧方好胡桃一枚劈做兩半將一半挖去肉以蟬蛻塞實對合用山泥包好煅存性研細陳酒下每日服一枚一月愈治瘰癧結核九真藤即何首烏藤洗淨日日生嚼並取葉搗塗之蝙蝠散治瘰癧多年不瘥蝙蝠一個貓頭一個上同燒作灰撒上黑豆煅其灰骨化碎為細末濕即乾摻干則油調敷內服五香連翹湯效治痰核瘰癧方用鼠糞揀兩頭尖者為雄兩頭圓者為雌揀開各曬乾研末男用雌女用雄將雞子一個頂上開一小洞傾去白但存黃入鼠糞在內以滿為度攪勻用皮紙封固小洞飯上蒸熟去殼臨睡時搓碎好酒送下隔一日再服雖遠年破爛者不過三四枚而愈未破者即消燕鼠膏治瘰癧痰核癰疽發背腫毒全蠍熱水浸透洗三次曬乾淨二兩白芷黃連黃柏黃芩當歸山甲各一兩生地赤芍各五錢官桂二兩海藻二兩五錢洗三次曬乾番木鱉五錢研碎用麻油一斤四兩浸藥五日熬焦黑色去渣將淨油稱準每油二兩用飛淨黃丹一兩收滴水不散先入白占一錢五分黃占三錢即下黃丹再下杭粉一兩用桑枝不住手攪成膏候冷入水浸三四日再用文火溶化再入沒藥三錢去油阿魏三錢麝香一錢血竭二錢朝南燕窩泥五錢雄黃一錢硃砂一錢兩頭尖七錢白升丹四錢以上各藥為極細末入膏內攪極勻用時隔湯溶化攤貼勿見火白升藥方水銀皂礬火硝白礬炒熟鹽