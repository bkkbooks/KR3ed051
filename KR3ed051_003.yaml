淬三次研細同搗棗肉搗丸桐子大每服二三錢吐出血膿而愈又方大白梨四隻銅鍋煮爛搗汁上白蜜上洋糖各八兩同熬將好下川貝母末四兩收之又方用百年咸芥菜滷久窖地中者服數匙立起此滷嘉興府城中大家多藏之又方將魚腥草水煮多吃即愈又方將苡仁為末糯米湯調下或入粥內煮吃或以水煎服或將苡仁連根搗汁沖好酒服總以當下膿血便愈治肺家吐臭痰或吐如魚腥痰要藥川通草蘆根苡仁桔梗治腸癰腹中㽲痛煩躁不安或脹滿不食小便澀婦人産後虛熱多有此症縱非癰疑似間亦當服之苡仁三錢栝蔞仁三錢牡丹皮二錢桃仁二錢上水二鍾煎一鍾不拘時服治腿癰方未潰前服歸尾一錢五分官桂一錢真漢防己一錢蠶砂三錢川獨活八分牛膝梢三錢乳香一錢木瓜八分井水煎食前服治陰疽癰發艾葉一斤硫黃雄黃各五錢以水同煮半日搗爛候溫敷上再煮再易十餘次知疼者可生疔治疔方名飛龍奪命丹蟾酥二錢乾者酒化血竭一錢乳香二錢沒藥二錢雄黃三錢輕粉五分膽礬一錢麝香五分銅緑二錢寒水石一錢海羊二十個即蝸牛是也天龍一條即蜈蚣是也酒炙黃去頭足硃砂二錢為衣上為細末先將海羊連殼研為泥和前藥為丸如緑豆大如丸不就入酒打麵糊為丸每服二丸先用蔥白三寸令病人嚼爛吐於手心男左女右將藥丸裹在蔥白內用無灰熱酒三四杯送於避風處以衣被復之約人行五里之久再用熱酒數杯以助藥力發出大汗為度初起者服二丸即消如不出汗重者再服二丸汗出即效三五日病重者再進二丸即愈如疔瘡走黃過心者難治汗出冷者亦死矣如病人不能嚼蔥擂碎裹藥在內熱酒送下瘡在上食後服在下食前服服後忌冷水黃瓜茄子豬肉雞魚濕面一切發風發瘡毒物又忌婦人洗換狐臭人觸之必發此藥活人多矣按疔毒切忌用風氣藥發散藥蓋疔毒散則死聚則生腐則生不腐則死須外敷拔疔腐藥內服清涼解毒諸藥凡疔發於頭面者切不可用冷藥敷之逼熱毒於喉間不能生矣又方名追毒丹取黃去疔頭膿者蟾酥一錢乾用酒化蜈蚣酒浸炙乾黃硇砂一錢雄黃二錢輕粉一錢白丁香一錢無此味加巴豆巴豆七粒去殼不去油硃砂二錢為衣上俱為細末面調水為丸如丸不就用酒打麵糊為丸如麥大兩頭尖入於針破口內用水澄膏貼之後用膏藥及生肌散追出膿血毒物又如有黑陷漏瘡四圍死敗肉不去不生肌者亦用此藥追毒去死肌生新肉方愈小者用一粒大者加之病輕者不必用針只以手指甲爬動於瘡上以藥放好用水澄膏貼之其瘡即時紅腫為度去其敗肉為妙用之神效立驗水澄膏方將白芨末放在盞內用水澄下去用紙貼之以此膏圍貼則不傷好肉治面上生疔腫大用活蝦蟆一隻將小刀劃開胸前露出肝來取下貼在疔上即愈治疔毒生唇上在大腿彎中紫筋上用銀針刺出血來即愈此名委中穴治紅絲疔手足間有黃泡即起紅絲一條走入心腹令人悶亂不救皆因大喜大怒氣血逆行所致急用針於紅線所到之處刺之擠出惡血再細嚼浮萍草根敷之立愈拔疔方荔枝肉二個吸鐵石一分雄黃三分上共搗分作三餅分三次敷之其疔自落又方荔枝肉蝦蟆肝黃丹同搗敷之又方荔枝肉一二個蝸牛三四個上和爛雞屎同搗爛入升藥少許刺破皮膚塗上疔根自出又方將銀簪腳刺破疔頭用多年露天鐵鏽或水中者更妙研如飛面將四五釐搽入刺孔內外用膏藥護之疔根絲絲拔盡愈矣治疔方用患者耳垢齒垢手足指甲屑和勻如豆大放茶匙內燈火上炙少頃取作丸將銀簪腳挑開疔頭抹入外用棉紙一層浸濕敷之痛立止內服仙方活命飲二帖兼可治紅絲疔治疔膏藥方乳香一粒麝香米大一粒黃連末連翹末桃仁二個去皮上同蝦蟆肝腸肺三味共一處入乳鉢內搗如泥白皮紙一小方攤膏藥貼患處三四日連疔揭去治疔方用家園菊花搗爛取汁一碗服下即愈無花根葉搗汁亦可有此方諸方可廢廣瘡結毒治廣瘡結毒神效方川芎當歸金銀花花粉防風生半夏姜礬制川貝母去心海螵蛸去皮水飛白芷各一兩南星一兩半薑汁製用土茯苓一斤米泔浸竹刀去皮搗爛不犯鐵器放砂鍋內用水四碗將竹箸量定深淺再加水四碗煎至四碗將前藥末十兩五錢投入再加水四碗煎至四碗濾去渣一日內服盡忌鹽與一切毒物發物粥飯只可淡吃輕者一料重者兩料痊愈一方每日調入八寶丹一分二釐八寶丹方真犀黃一錢血珀二錢珍珠二錢冰片一錢滴乳五錢飛面八錢辰砂二錢飛滑石四錢又方胡連宣連大川芎牛膝各二錢豬胰脂一個皂莢子七粒先將土茯苓一斤以石捶碎用水八碗煎至六碗入前藥又煎至五碗入胰脂再煎至四碗溫服仍用水四碗煎至二碗服第二次煎時用竹箸在罐內逐碗量定水痕此瘡必須先吃毒物發透然後服此二三服瘡勢便覺稍可矣後劑即加苡仁當歸各二錢於前方內照法煎服重者不過四五劑輕者無出兩三服遍體貼然且無結毒之患脫痂後再服排毒散數貼尤妙前藥俱不可犯鐵器切忌飲茶治頭面結毒方蘄艾一兩川椒八錢麻黃去節三錢川芎二錢白茯苓二兩豬頭天靈蓋骨火煅存性五錢上研極細末蒸餅丸如緑豆大飯後白湯下三錢三四日瘡口乾燥不臭是其驗也服至瘡平方止治楊梅瘡方雄黃一錢半輕粉一錢杏仁三十粒去皮上共為末用雄豬膽汁調擦此武定侯府中方也治楊梅結毒方殭蠶蟬蛻各三個豬牙皂三錢皂角子七個研碎土茯苓三錢生大黃一錢半甘草三錢穿山甲三片煅上將河水二大碗酒一大碗煎一碗不拘二服三服以瀉為度若腸中一響欲瀉可即往高處出恭不可復聞臭氣瀉後若身子壯者再服一服弱者不必再服忌雞鴨魚腥等物治結毒敷藥祕方真輕粉二錢杏仁霜二十粒去皮尖取霜番木鱉火煅存性三錢兒茶三錢火煅膽礬三分片腦一分上共研極細末用鵝膽或豬膽調敷一日一換數日痊愈治楊梅瘡點藥方兒茶杏仁霜各一錢輕粉五分冰片三分上用鵝膽調點一次過夜即脫靨治棉花瘡點藥方凡棉花瘡毒及下疳或初感或毒盛經久難愈速用新槐蕊揀淨不必炒每日早晚服在食前用清酒吞下三錢許服至二三日則熱毒盡去除根亦無寒涼敗脾之病此經驗神方也如不能飲酒即用滾水鹽湯俱可送下但不能如酒速效耳治服輕粉毒名五寶湯紫草金銀花山慈菰各一兩乳香沒藥各五錢用新汲水六碗好陳酒五碗煎六七碗空心溫服取汗不可見風一二服其毒即從大小便瀉出若結毒先服五寶湯再用後搽藥如有爛去鼻與陽物等患即能復原應驗如神搽藥方輕粉一錢乳香六分沒藥二分血竭一分兒茶一分大珍珠三分紅羯子二分燒灰文蛤二分燒存性宮粉六分煅過麝香一分冰片一分蟾骨五分胎髮二分燒存性白螺螄殼二分燒存性上十四味共為細末瓷器收貯用時先將濃甘草湯洗患處然後搽之又方臘豬頭骨捶碎土茯苓舂碎金銀花各一斤水煎服藥畢即愈治楊梅結毒洗敷方膿水淋漓臭爛不可近者楓子肉四兩輕粉一錢萆麻仁二兩爐甘石二錢杭粉二兩花椒五錢上共為細末搗加麻油捶成膏用油紙攤貼瘡上其瘡先用花椒甘草煎湯洗淨三日一換五六次即愈治服霜粉牙根腐爛出血不止管仲黃連各五錢上二味為末水一鍾煎四五沸入冰片少許攪勻漱口每日一次忌豬腥油膩一月下疳治雞肫疳魚口下疳方婦人陰戶臭爛亦用此藥愈熟乳香冰片珍珠末象牙末兒茶各三分搽麵粉一兩入傾銀罐內煅紅鵝黃色牆上白螺螄殼洗淨入傾銀罐內煅過淨末一兩上共研細末瓷瓶收固若要上藥先用米泔水煎滾入雄黃三錢於湯內淋洗患處然後上藥不拘男婦三日後立效治瀉燭疳半邊溜爛是也又名蠟燭疳從內爛出者將人腳根上老皮不拘多少瓦上焙脆為末黃柏末用豬膽汁拌曬乾再研摻患處烏金紙包頭治下疳方土牆上白螺螄殼灰一錢五倍子灰二分燈草灰五分甘草灰五分黃柏灰五分輕粉四分牛黃五釐兒茶五分冰片五釐上為細末先用皮硝湯洗次用土茯苓湯洗後將藥擦患處又方大紅絨一錢冰片三分鐵鏽一分鳳凰衣五分煅存性血竭一錢上研極細敷患處效又方用白鵝一隻以白米養三日後取鵝糞以新瓦焙乾黃為末每糞一錢和丹砂一分冰片一分共研極細用米泔水洗淨其瘡如瘡乾用雄豬膽潤之以藥敷上如瘡濕則不必用豬膽潤之矣又方窯底蜆殼燒紅童便煅七次橄欖核燒灰冰片五釐陳鴨蛋殼內衣共研末疳濕乾摻疳干唾津調搽中毒解百毒粉甘草生用二兩緑豆一升水煎服立效又方凡覺腹中不快即以生黃豆試之入口不聞腥氣此真中毒也急以升麻煎汁連連飲之將手探吐自愈或嚼生礬一塊覺甜而不澀者是毒否則非也治服截瘧毒藥身體發腫氣喘方此症因藥內有常山砒信等毒使瘧邪遏抑於內藥毒攻於皮膚頭面故滿身浮腫氣逆發喘煩躁用生緑豆或一升或半升連皮搗碎滾湯泡出濃汁涼服少頃肌膚間有聲一日夜腫消喘止解砒信毒急用密陀僧一兩或二兩研細冷井水飛徐徐灌下或吐或瀉則砒信裹在藥末內出矣神效無比或外再以井底泥塗胸前或以生蟹或用田螺搗塗臍四旁更妙又方白蠟三錢研末調雞子清三五枚入口即愈治信毒並治銀匠爐中𥐶子毒方錫灰一錢雞子七個將二味攪勻吃下即愈按錫灰即白鐵消後鍋內所遺渣垢也再連鍋燒紅即化成灰研為細末每服二錢若服毒過多加倍用神效誠急救良方也解食銀硝毒方將黃泥水服二三茶杯即愈解斑蝥毒方中其毒者必腹痛嘔吐煩躁欲死急以生雞子清三四枚灌之即時止痛而愈治誤服水銀方在背陰處掘地二三尺取泥為丸如梧子大以冷井水一碗送下腹中即瀉水銀隨下矣解巴豆毒方若中此毒必口渴面赤五心煩熱泄痢不止用黃連煎湯服解鹽滷毒方將豆腐漿灌下或肥皂水皆能令嘔吐切不可飲熱湯飲活羊血尤妙解燒酒毒方用鍋蓋上氣水一杯灌下即醒解中白果毒方小兒食之過多飽脹欲死急用白鯗頭煎湯頻頻灌之少頃自定解食桐油嘔吐不止方將乾柿餅食之立解解癲狗咬方即不咬破亦有毒先用蓑衣草扎住兩頭以衆人熱小便洗搦去血水急取斑蝥七個去頭翅足酒洗和糯米一把水淘趁潮同斑蝥炒以米黃為度須於銅杓內炒加六一散二兩共為細末酒下或木通燈心煎濃湯下老少虛弱者分作四分壯年者作兩服當時一服餘明日清晨服服後本人頭頂心必有紅頭髮一根要拔去將草紙攤在灰沙內撒尿於其上應有或紅或白惡物如狗形者如服完即無狗形出亦不妨矣服後用甘草湯漱口要忌一切葷腥油膩雞鴨蛋百日內要忌房事如不忌男女俱傷小紅赤豆茄子狗肉終身禁食至茄子並不可相近邪犬之形尾反舌垂舌吐出黑色者是宜急避之治狗咬方用木鱉子燒灰存性敷之解毒蛇咬方明雄黃五錢五靈脂一兩共研細末每服二錢陳酒送下即將此末用麻油調敷患處隔一時再進一服立愈亦有加白芷貝母四味等分者亦每服二錢又方用香白芷為末每服三錢麥冬煎湯調服其腥氣黃水從瘡口出而愈解蜈蚣咬方用舊毛竹箸將圓頭寸許燒焦取下研末敷患處立愈又方取蜒蚰塗上其痛立止治蠔毛刺方用甘草煎濃湯浸洗砂糖搽之糖霜亦可治誤吞針方名吸針丸用透活磁石生研將黃蠟和捻如針涼水送下裹針從大便出治誤食銅錢方胡桃肉四兩荸薺一斤共搗汁和酒服其錢即消自大便而出諸瘡治禿瘡方白雞子油松香小兒頭髮用香油煎油成膏塗上即愈治一切禿瘡並陰陽頑癬用不落水豬網油攤開將松香研細摻在網油上卷如煤頭在燈火上燒著下用蚌殼內放生礬末少許受滴下之油乘熱攪勻冷定搽在患處或用攤油紙攤膏貼更好治禿瘡方先用黃齏汁洗之醋湯亦可皂莢七個廁內浸七日洗淨曬乾火煅榆白皮煅枯礬牛煙膠輕粉霜梅肉銅青將醋浸調搽又方白松香四兩肉墩頭屑三兩燒灰存性碎新青布二兩燒灰存性將多年竹燈烙窩放鬆香在內燒煬連油滴出以碗受之將前三味調勻敷之四五日後待其自落即愈治對口瘡神效方用活鯽魚一尾去腸鱗搗爛加發垢四兩白蜜少許攪勻從瘡外圈入裡面敷之極厚留一孔出氣外以紙貼之一二日即愈又方名蟾蜜膏飛鹽五分蔥白三莖活蝦蟆三個蜜一兩共搗一處敷之又方婦人頭上油垢三錢黑背鯽魚一個約一兩豬眼梢一對上同搗爛敷之又方將雄豬眼梢肉三錢剁爛如泥加滑石末錢和勻敷患處頂上以膏藥蓋之拔去僵肉放出黃水即愈又方鮮茄蒂七個乾者加倍鮮何首烏一兩上用河水三碗煎一碗食遠服一服出膿兩服收口治痄腮方用陳石灰不拘多少炒七次地土窨七次醋調敷立愈又方山梔末飛面各等分豬膽汁好醋各半薄調敷患處治拍蟹毒即手大指食指間所生俗名丫指用活蟹打爛塗之治指上疔瘡名天蛇頭又名雄公蛋用雞子一枚頂上敲一小孔先去其清放杯內後去其黃仍以清入殼將蜈蚣一條煅灰明雄黃末一錢二味共納入殼攪和以指入殼周圍以棉紙封固三四層候一晝夜打碎遠遠拋擲切不可聞其臭氣此瘡立愈一方只用蜈蚣為末雞子不去黃套指上候熱再換一個即愈又方豬膽一個入雄黃末一分攪勻套指上二三時即愈又方雄黃細末和蜒蚰搗爛敷之即愈又方雄黃七分白芷三分共為末入雄豬膽內套指上立愈治坐板瘡方生在臀上俗名臀支瘡用八九月間的西瓜皮刮薄存一粒米厚者日中曬脆研細瘡有膿則乾摻無膿將自己津涎調末敷上少頃瘡中即流出水來敷二次即愈治爛腿方用白芷黃蠟飛丹片粉各等分蔥頭搗豬髓調敷油紙扎住七日一換二次痊愈治腳面生瘡不收口松香枯礬杉木灰各一錢共為末用麻油調塗數次即愈治脫疽方此症發於腳趾漸上至膝色黑內痛不可忍逐節脫落而死亦有發於手者土蜂窠研細醋調搽應手而愈真神方也治陰濕腳瘡久爛銅青膽礬各五分飛丹二錢密陀僧輕粉石膏煅各一錢上研末臨臥時摻上痛一夕即結痂或有癢處毒水不幹又摻上癢極擦之治腳指縫爛鮮鵝掌黃皮陰乾燒灰存性為末摻之極效又方好黃丹一味摻三五次即愈又方陳松蘿茶末摻之治腳指縫濕爛癢方用三白頭升藥底少許和白糖霜打爛敷之治腳指頭上臭爛瘡方俗名臭田螺青石屑用市中多人踏者又要潔淨者須研極細絲棉灰少許冰片少許三共和勻摻上外以膏藥貼之即愈治行路足腫方用草鞋浸尿缸內半日以磚一塊燒紅置鞋於上將足踏之令熱氣入足內腫即消治臁瘡方陳石灰坑砂煅伏龍肝百草霜各一兩上共為末先將蔥艾煎湯洗之桐油調敷將草紙扎緊又方修船舊油灰煨東丹石膏煨各等分上研極細先將豆腐溫水洗淨患處用麻油調藥敷之極厚三日一洗一換最無不愈又方桐油菜油麻油各五錢松香制一兩飛丹制三錢銅緑二錢黃占白占各五錢先將三油熬數滾後入松香黃白占再熬數滾後入飛丹銅緑細末收之攤隔紙膏貼之一方松香只用三錢銅緑只用一錢五分治臁瘡久不收口方杭州破黑傘紙燒灰飛丹輕粉各一錢牛腳胎煅至周圍焦枯以刀刮下再煅再刮直下至無心為末三錢四味與豬油同搗極爛做夾紙膏以針刺孔先以蔥椒飛鹽湯洗淨拭乾貼之生肌長肉再貼五六日收口而愈又方用鮮桑白根皮一斤生豬板油四兩共搗作餅將一餅貼之每日換一餅五六日後換生肌末藥用赤石脂乳香沒藥白占冰片炒黃輕粉煅過狗脛骨以麻油調塗碗內復定燒蘄艾燻黑碗內藥連番十餘次方以此藥做夾紙膏貼之數日即愈治濕爛臁瘡並一切頑瘡不收口者麻油柏油各二兩五錢管仲三錢象皮五分切片血餘一大團同煎至發枯去發再煎滴水成珠下炒飛丹五錢方下後藥硃砂兒茶輕粉沒藥去油川椒樟腦各五分乳香去油三錢五分血竭一錢共為末攪勻離火候半冷下黃蠟二錢五分杭粉一兩五錢如法熬成膏攤貼患處一日一換神效治臁瘡久不愈者祕傳夾紙膏老松香樟腦虢丹炒水龍骨即舊船底內油石灰共為細末溶化松香以小青油和之以油紙隨瘡大小作夾膏洗淨瘡後貼之二三日一換即愈若不效加白芷川芎螵蛸於前膏內若不加入以此三味煎湯洗之亦效凡臁瘡用夾膏須用舊傘紙以甘草湯煮密刺其孔比他紙尤效如用尋常油紙須用甘草白芷花椒荊芥煎湯煮過曬乾攤膏則不痛且不生拐又方麻油九兩大活雄鯽魚一個約斤許者大楓子肉去油四兩同熬至魚焦枯濾去渣將油再煎滴水不散將油稱見分量每油一分用飛炒過黃丹半分加銀硃二錢收之攤貼若不能收口用哺胎不出雞子瓦上煅存性研極細摻上即收口此摻藥方不但治臁瘡凡結毒癰疽炙瘡久爛者立能收口生肌又方名白玉膏乳香沒藥象皮白蠟各五錢輕粉四錢密陀僧鉛粉黃蠟各二兩以上除蠟俱為極細末先用真桐油一斤放鍋內火上滾透去沫油先入密陀僧末攪勻取起入二蠟溶盡攪勻待油稍溫方入細藥攪三百餘遍以大棉紙攤上陰乾隨瘡大小煎成膏貼待瘡中毒水流出膏藥遍黑再換新者貼之又方名紫脂膏好麻油四兩淨花椒三錢蔥頭七大個連須七寸長三味同煎至蔥焦脆去渣入白色松香五錢黃占六錢文火煎化去上面浮出渣滓煎至油麵上有花紋急離火傾碗內加入好銀硃一錢攪勻收之待冷凝將碗合土地上三日去火毒攤夾紙膏貼之紙只要一面刺孔每膏貼五日一換如痛者用甘草湯先洗癢者花椒湯洗若貼一膏即流盡黃水者貼至五六膏而愈若貼至三膏方流盡黃水者須貼至二十膏而愈凡初貼之膏出水者膏中有毒氣在內揭下則無用水盡後再貼之膏須存之以待後來將長肉結蓋時用此貼過舊膏貼之以為收功最妙治濕毒臁瘡方爐甘石用童便制八九次豬油調搽神效又方伏龍肝蚌殼灰各一兩輕粉一錢半或加蒼朮一錢黃柏一錢各炒焦為末和勻用菜油調攤夾紙膏將針刺孔扎瘡上三日一換先用花椒米泔煎滾洗瘡治濕瘡方取桑樹根上土中鮮白皮去粗皮切細同生豬油放石臼內打糍先用冷茶洗瘡拭乾用此藥敷之外以油紙蓋之將帛扎緊換四五次即愈加白蠟同搗作餅反復貼之一日夜再換拔去毒水臭腐生肌收口濕瘡與臁瘡有別濕瘡有水窠頭不爛而甚癢臁瘡必爛而痛凡治濕瘡切不可用升藥及冰片非惟不能奏效反致潰爛難愈凡遠年濕風瘡癢甚諸藥不效者必有蟲在內須用藥引出其蟲則用藥有效矣凡治濕瘡先用鉛打薄片貼之以帛扎住毒水自流流盡然後用藥方易見效又方疥瘡白泡亦治楓子肉一兩蛇床子炒煙膠瓦上炒乾黃柏末自死龜板炒灰各五錢黃丹二錢水飛炒紫真輕粉五分上為細末桐油調搽上以油紙復扎五日一換三次即愈柏油調藥更妙一方無煙膠有煅龍骨用熟桐油調藥又方黃柏末銀硃飛丹各五錢煨石膏龜板燒灰蚌殼灰各一兩輕粉二錢嫩松脂三錢共為細末菜油調作夾紙膏貼又方名蔥連膏飛丹二錢乳香沒藥黃連各五分血竭一錢冰片一分松香五錢萆麻子十八粒蔥白帶須七根共為末將蔥頭打爛和勻以菜油調做夾紙膏貼之治臁濕瘡方黃丹無名異各五錢輕粉一錢乳香沒藥樟水水龍骨百草霜各一兩共為細末桐油調夾紙膏貼之前後翻換神效或加血竭血餘兒茶螵蛸銀硃銅緑等藥貼過舊膏藥藏好以備日後收瘡口之用治一切瘡毒隨貼隨愈並治風濕癰疽癱瘓鶴膝風等症俱神效南星川大黃桃仁羌活半夏草烏川烏紅花獨活當歸各四錢用真麻油一斤加生薑一兩蔥白不拘多少亂頭髮一團入藥內熬焦枯色用絹濾去渣用上好松香一斤入濾過清油內又熬至胡桃花起先加入密陀僧二兩再徐徐加入硫黃末半斤投此二味時務須慢慢灑入不可太多太驟以滴水成珠為度將此膏藥傾入水中去火毒治熱毒濕瘡遍體生瘡痛而不癢手足尤甚黏著衣被日夜不得眠者用石菖蒲三斗為末鋪席上臥五六日即愈治諸瘡弩肉如蛇頭凸出寸許者用烏梅肉煅灰摻上即愈治膿窩瘡名雞黃煎煨石膏三錢寒水石二錢黃丹硫黃各一錢共研極細末將雞子黃熬出油調敷又方大黃三錢半吳萸去梗一錢半共研細末菜油調搽即效治諸瘡摻藥方煅熟石膏一兩松香白芷各三錢樟腦二錢輕粉五分冰片一分上為極細末熬熟豬油調搽治白泡瘡更效治天泡瘡方黃柏末一錢半輕粉一錢雄黃一錢青黛二錢滑石一錢寒水石二錢火煅銀硃一錢半辰砂五分鉛粉二錢側柏葉末一錢上為細末絲瓜葉打汁調搽立效又方將緑豆裝入粗瓦瓶內以毛竹筷一把塞緊瓶口再用瓦盆一個底下鑿一孔將瓶倒插於盆孔內盆內用礱糠炭屑燒之緑豆油即在箸頭上滴出下以碗收之俟出火毒用油抹點瘡上二三次立愈又方青黛滑石各等分馬蘭汁調敷又方石膏黃柏青黛各等分為末扁柏汁調敷治痱子方將臘雪收藏瓶內封口至端午日放黃瓜在瓶中浸之封好遇有痱子敷上即愈治痱瘡癢痛方滑石五錢緑豆粉四兩微炒上研細和勻以棉撲之一方有棗葉一兩治痤痱作癢抓之又痛難於坐臥者名苦參湯用苦參四兩大菖蒲二兩河水五瓢同煎數滾添水二瓢蓋片時臨洗和入雄豬膽汁四五枚洗之避風甚效治一切熱癤用芙蓉葉菊花葉同煎水頻洗或搗爛敷之甚效治凍瘡久不愈年年發歇先癢後痛後即腫破出黃水及出血不止者名雉腦膏雄雉腦一枚搗爛黃蠟清油上三味以文火熬成膏去渣瓷器盛用每日塗瘡上一方用大蒜梗煎湯洗之又方用白蘿蔔打碎或切碎內揀大者切二三寸一段同用水煮一二十滾不可太爛亦不可太生以所煮湯熏洗浸並將所煮蘿蔔在瘡上摩擦一日洗三次連洗三日即愈永不發治冬月手足開裂方用清油五錢文火煎沸先入黃蠟一塊煎化再入光粉五倍子少許熬令稠紫色為度先以熱湯洗患處火上烘乾即用藥敷其上以紙貼之其痛立止入水亦不落若油中入粉多則硬而成塊須以火炙動挑敷亦不妨一方無五倍子一方加魚膠白芨末又方名油胭脂用生豬板油去筋膜一兩入鍋熬淨再入黃占五錢白占三錢同化清次入銀硃黃丹各五分攪勻以軟能攤開為妙敷之即愈又方用童子剃下頭髮洗淨令乾將一二兩放杓內熬煬入羊油再同熬令其無滓去火俟冷如膏藥捻成細條放入縫內一日夜裂縫即不痛矣治湯火瘡方當歸生地各一兩麻油四兩黃占一兩白者只用五錢上先將當歸生地入油煎枯去渣將蠟溶化攪勻候冷即成膏矣用塗患處將細紙蓋之極效若發背癰疽潰爛者用之亦甚效凡死肉潰爛將脫止有些些相連者宜用剪刀剪去蓋死肉有毒去遲則傷新肉矣死肉去盡尤宜速貼蓋新肉最畏風寒切不可忽也又方將豬毛煅存性研末加輕粉硼砂少許麻油調和敷之立效且無斑痕又方用雞子黃置銀石器中熬出油調胡粉敷之治湯泡方將煮熟雞子黃炒出油一杯調生大黃末一兩搽之治火湯熱油傷方用生雞子清好陳酒沖和調敷三次必愈治火燒爛神方凡遇此症切不可浸冷水中熱毒內攻必爛至骨用好陳酒一二十斤傾入浴缸內略燒溫令患者坐酒中浸之極重者不死治火燙傷方急使一二歲小兒不拘男女撒尿於室中結實淨土地上少頃取地面上浮膩滑濕之土敷之即日止痛解火毒甚妙治湯泡火燒方此症切不可用冷水澆洗如藥不便先飲童便一碗或生蘿蔔汁一碗再將生大黃細末或香油或生桐油調敷如爛至肌肉者用山野人家百草霜三錢輕粉一錢五分研末香油調敷甚效治初燙與潰爛方名解毒行血膏當歸劉寄奴頭髮洗淨生地各一兩將麻油六兩銅鍋內煎至發化藥黑濾去渣下白占八錢不住手攪勻候藥稍溫下生寒水石煨大黃嫩黃柏生礬末各一兩輕粉末二錢攪至藥冷埋土內出火毒患者塗之治漆咬瘡方木形人每患此症用杉木皮煎湯洗之蟹殼湯洗亦可又方將活蟹搗爛塗上即愈取瘡中多骨方用烏骨雞脛骨實以砒石鹽泥封固煅紅出火毒研末飯丸粟米大將白紙捻送入孔中以拔毒膏貼之其骨自出諸丹毒治蛇丹方刺鱔魚尾血同蜒蚰搗塗治火丹方將蜒蚰搗爛磨好京墨汁和塗之又方柏葉蚯蚓泥韭菜地上者尤妙黃柏大黃各五錢赤小豆輕粉各三錢共研末新汲水調搽凡生火丹流火切不可吃豬肉吃則發腫不消又方將冬青樹葉搗爛和入雞子清敷患處以絹縛之一周時即愈治流火方鮮紫蘇鮮鳳仙花將二味洗淨連根葉搗爛放木盆內以滾水衝入將腳架盆上熏至可洗以軟帛洗之立愈十餘年者不過洗三四次不發矣治流火毒方大黃山梔黃柏雄黃南星上為末將瓦花搗汁調敷立效無名腫毒治無名腫毒未成初起五天之內照方一服即消如毒旺者接連三服無不消盡真神方也用雞蛋一個傾在碗內攪勻入芒硝一錢隔湯燉熟用三白酒照量飲食盡為度內托護心散防毒氣攻心真緑豆粉一兩乳香五錢燈心灰上共為末和勻以生甘草一兩煎濃湯調一錢時時呷之治男婦小兒一切無名腫毒將苦絲瓜連筋帶子燒存性為末每服三錢白蜜湯送下日二服夜一服則腫消毒散不致內攻真妙方也治一切無名腫毒魚口便毒楊梅結毒等症即消名二角消毒散雄羊角二斤血餘炭一斤穿山甲半斤角刺灰一斤上四味俱用文武火煅灰存性每服二錢或三錢酒送下治一切無名腫毒瘰癧尤效名四制鯪鯉丸歸尾五錢大黃荊芥桔梗乳香炙沒藥炙各二錢黃芩連翹各三錢防風羌活各二錢半全蠍一錢蟬蛻二十個去頭殭蠶二十五個牛皮膠一兩土炒雄黃七分用金頭蜈蚣四條去頭足分作四樣法制一條用薑汁搽焙乾一條用香油搽焙乾一條用醋搽焙乾一條用酥搽炙再用穿山甲四兩亦作四制一兩用紅花五錢煎湯煮焙乾一兩用牙皂五錢煎湯煮焙乾一兩用紫草節五錢煎湯煮焙乾一兩用蘇木五錢煎湯煮焙乾上藥共為細末真米醋打糊為丸每丸重一錢二分硃砂一錢五分共為衣瓷瓶收貯瓶內放麝香五分以養之每服一丸滾酒送下未成內消已成出膿神效治諸毒已成未膿之際服此毒不內攻名琥珀蠟礬丸白礬一兩二錢黃蠟一兩雄黃一錢二分琥珀一錢另研極細硃砂一錢二分白蜜二錢上四味先研極細另將蜜與蠟銅杓內溶化離火片時候蠟四邊稍凝方入上藥攪勻共成一塊一人將藥火上微烘衆手急丸小寒豆大硃砂為衣瓷瓶收貯每服二三十丸白湯食後送下病甚者早晚日進二次移毒方凡毒在緊要處移在閒處庶不傷命用地龍裝在經霜絲瓜內煅枯焦連瓜為末每瓜末三錢入麝香二分乳香沒藥各五分雄黃一錢蟾酥一分黃蠟一兩共為末蠟丸每服三分上部要處甘草桂枝麻黃煎酒下即移在手上而散如在背上羌活防風姜煎湯下移在背上如下部木瓜牛膝靈仙陳皮獨活姜煎湯下移在足上神效治陰症諸毒膏附子肉桂川烏草烏大戟芫花甘草甘遂各七錢一方加乾薑一兩四錢附子麻油二斤煎治陽症腫毒膏馬錢子四兩大黃生地各二兩薄荷玄參黃柏黃芩梔子血餘各一兩蝸牛十個上用麻油煎去渣滑石研末收治諸惡瘡腫核赤暈已成膿不肯用針刺以此藥代之但用小針點破瘡頭貼上膏藥膿即自潰此祕妙良方名萬寶代針膏蓬砂血竭輕粉各一錢半金頭蜈蚣一個蟾酥五分雄黃一錢冰片少許麝香一分上為細末用蜜和為膏看瘡有頭處用小針挑破以藥少許放紙上封貼次早其膿自出如腋下有耍孩兒名暗疔瘡或有走核可於腫處用針挑破如前用之忌雞羊魚酒面等物吃白粥三日為妙加味太乙膏肉桂白芷當歸玄參赤芍生地大黃土木鱉各二兩上阿魏二錢輕粉四錢槐枝柳枝各一百段血餘一兩東丹四十兩沒藥末三錢乳香五錢麻油五斤將藥入油熬熟濾過煉成膏每油一斤加丹六兩五錢夏秋再加五錢治癰疽神應膏真阿魏三錢麝香二錢硃砂四錢雄黃五靈脂甘草各一兩川烏草烏各四兩將新鮮鬧羊花十斤揀去梗葉打自然汁入瓦器中煎成膏如稠糖為度將藥為細末入羊花膏內攪勻勿令凝底用大瓷盆幾個每盆將藥攤一薄層置烈日中曬乾取入瓷瓶封固如遇腫毒用酒調勻如半乾糊將筆蘸藥先從紅腫上面畫一圈待藥將干再畫第二層於圈內與前圈相連即將酒潤舊干圈上待第二圈將干再畫第三層於圈內與第二層相連又將酒潤外邊干處每幹一層再畫進一層止空當頭如豆大一孔使毒氣從此而出圈完用酒常潤藥上不可間斷至半日乃止待藥自乾落不必洗去其毒自消一方只用三味新鮮鬧羊花五十斤打爛絞汁熬膏川烏草烏末各一兩和入膏內用法同前八仙膏龍骨赤石脂兒茶血竭乳香沒藥各一錢輕粉五分或一錢冰片二分用麻油二兩入當歸五錢煎枯去渣入龍石茶竭四味再煎一二沸次入乳沒略煎勻後入黃占五錢溶化冷定入輕冰攤貼千捶膏松香鍋內溶化傾入清水內片時揉白取用約一斤萆麻子六兩淨柏油二兩白蠟二兩大黃銀硃各二兩左顧牡蠣二兩用粗草包好入火內煨存性捶膏之法在光平青石上先將松香一二兩與萆麻一二兩鋪於石上用鐵錘打碎干則加萆麻濕則加松香余藥亦漸漸摻入捶至極細膩為度遇無名腫毒攤貼用麝香少許初起者一張便效若已潰者用阿魏少許即止痛且易收口此膏忌見火須隔湯燉軟攤之蜜膏治一切臁瘡痰癧廣瘡下疳久不收口者松香一斤四兩醋蔥汁煮過為末篩淨一斤黃占白占各一兩輕粉一兩乳香沒藥樟冰象牙末炒竹蛀屑龍骨火煅赤石脂醋煅海螵蛸去殼人中白煅麵粉炒各五錢兒茶三錢血竭六錢白蜜一兩桐油十三兩上十八味先用松香溶化次下桐油次下黃白二占次下龍骨等藥次下輕粉次下象牙末次下乳沒次下樟冰次下白蜜生肌收口膏治諸瘡並下疳及輕粉毒乳香沒藥各去油兒茶血竭輕粉各一錢寒水石水龍骨各煅韶粉各三錢發灰黃占白占各二錢麻油四兩將油先熬數沸下蠟後下藥末用槐枝攪勻攤膏先以防風荊芥苦參黃柏黃連連翹銀花甘草槐花緑豆粉各三錢煎湯洗淨其瘡然貼後之一方有鬱金一味
