body:
  text: 卷三公選良方疝氣治諸疝海上丹方雄豬大腰子一對不落水去膜並血切作片以大茴香小茴香各一兩俱炒為粗末同腰子拌勻復以豬尿胞一個入拌者在內扎固用無灰好酒二碗砂鍋內懸尿胞於其間煮至酒存半碗收出一併切碎焙乾研細存酒打糊丸如桐子大每服空心陳酒送下七十丸一方用生白酒三碗煮治響疝並小腸氣木通川楝各一錢大茴五分飛鹽三分半上為末水酒調服頭服出汗服七日痊愈如少年加一倍俱空心酒下治疝氣方荔枝核六兩橘核打碎炒一兩小茴炒六兩川楝子一兩酒蒸蘿巴酒拌炒一兩吳萸鹽水炒一兩澤瀉一兩甘草五錢青皮一兩山甲土炒二兩上為末每服一錢升麻一分半黃酒調下治濕疝陰丸作痛蘄艾紫蘇葉烘川椒炒熱各三兩上三味拌勻乘熱絹袋盛夾囊下勿泄氣治陰囊腎子腫大方灶心土三升砂鍋內炒熱加川椒小茴香末各一兩拌勻將陰囊坐在上面冷則再換如此三次即愈治陰子腫大不消頂大荔枝核十二三個煅灰存性以火酒調如糊吃下即消若重者再吃一服治疝氣偏墜用肥薑切片鋪湊板上上堆蘄艾一尖點火燒之候將完即乘熱帶火連姜並艾搗極爛將鮮菜葉一大片放手掌內即以姜艾攤勻菜葉上用手向腎囊底下托之初時其冷如冰須臾滾熱通身出汗而愈心口胃脘痛治心頭痛欲死不可忍者良薑厚朴薑汁炒靈脂上各等分為末每服一錢醋湯下即止治心痛方實胃口痛也若真心痛不治高良薑酒洗七次焙研香附子醋洗七次焙研上二味各記另收之病因寒得者薑末二錢香附末一錢病因怒起者香附末二錢良薑末一錢寒怒兼有者各用一錢五分臨服時以米湯加入生薑汁一匙食鹽一捻或二服或三服痛止後用剷刀挑鹽一撮火上燒紅泡湯服並服大棗數枚約數朝神效治心痛方婦人服之甚效丹參一兩檀香一錢砂仁一錢共煎八分服之即愈治心口胃脘痛用大黑棗去核每個中間入胡椒七粒仍將棗包好炭火上煅焦黑存性研末每服三四分陳酒送下三四服必愈加木香枳殼紅花當歸五靈脂少許更妙治胃口痛方手指甲男痛用女右女痛用男左剪下於新瓦上炙脆存性為末約四五分入砂糖少許或湯或酒調之食遠服治胃寒常發噁心嘔吐或痛用老生薑半斤去皮搗爛絞汁去渣隔湯煮一二十沸停火將上白洋糖半斤攪入再煎一滾收之時時吃二匙作三四日吃完重者服至兩料必愈治胃寒嘔吐兼治寒瘧大黑棗七個去核每個內入丁香一隻煮爛去丁香將棗連湯空心服七服見效治嘔吐不止陳梅醬煎濃湯如有火加竹茹有寒加豆蔻或砂仁或煨姜如無梅醬以烏梅代之治嘔吐方見食即嘔或食罷即吐初起者易治此痰在胃口也生薑二兩打碎陳皮五六錢切碎泡湯一碗慢慢逐口吃下自安甚者竹瀝薑汁和勻逐匙挑在舌上咽下若咽急並藥吐出矣治感氣或飲食傷脾作痛方橘皮一把煎濃汁一碗打入鹽姜少許吃下神效補脾養胃方名陽春白雪糕茯苓山藥炒芡實蓮肉去心各四兩糯米黃米各半升具炒白糖二兩先將藥米粉蒸熟再入白糖印作餅子曬乾每日空心吃幾個極有益治老人脾泄最宜名玉露霜白朮二兩炒陳皮一兩五錢蓮肉四兩去心苡仁四兩炒糯米緑豆陳米鍋焦各一升俱炒共為末收貯臨用時糖霜量加將滾水調服二三兩治腫飲燈草一把先將水四碗煎至二碗蘿蔔子一兩微炒砂仁二錢微炒將二味研末傾入燈草湯內略滾即盛入茶壺內慢慢吃下吃盡不見效如前再煎一服俟腹響放屁小便長而腫即退厄逆治厄逆欲死半夏五錢生薑二錢五分水煎服即愈治病後厄逆不止刀豆子燒存性滾水調服二錢即止神效治厄逆不止方用荔枝七個連皮燒灰存性為末白湯調服立止咳逆治咳逆方明雄黃一錢酒一杯煎七分急令患人嗅其熱氣即止又好硫黃乳香各等分以酒蒸急令患人嗅之又硫黃乳香艾各三錢治食物醋心用胡桃嚼爛生薑湯下立止耳治耳暴聾方菊花木通石菖蒲擂爛酒服之治耳聾方真北細辛研末熔黃蠟為丸如鼠糞大以綿裹塞耳中二三次即愈又老鼠膽汁滴入耳中二三次即愈治耳內出膿方胭脂枯礬釘鏽粉上各等分為末吹之立效又羊屎彈燒灰一錢枯礬輕粉各五分上為末用棉花捲淨耳內膿將葦管吹入立效治耳中膿水不止方龍骨枯礬干胭脂要産山東濟寧府如銀硃樣紫色者非綿胭脂亦非油胭脂海螵蛸各等分麝香少許上為末先以棉紙捻干輕吹耳內治耳中腫痛並出膿血方黃魚牙齒瓦上炙存性為末放土地上退火氣研末加冰片少許菜油調雞毛蘸入耳中加干胭脂更妙又用橄欖核燒灰存性每核一枚入冰片二釐研極細末吹入耳中即愈治耳中常出血方五色龍骨煅研細末吹入耳中即止治耳出臭膿方龍骨煅五倍子炒乳香枯礬血餘炭上各等分為末卷淨吹之治耳中膿水不幹石榴花瓣不拘多寡炙脆研末加些冰片再研吹耳自愈治百蟲入耳方如蟲入耳不可驚動在左耳以手緊閉右耳及兩鼻孔努氣至左耳蟲自出右耳亦然目烏羊肝丸大能烏須黑髮聰耳明目黑羊肝一具竹刀切片放瓷盆內再以羊膽不拘多少塗曬乾又塗又曬將膽汁塗曬至二三百個為佳少亦要在百個之外以膽汁多為妙曬時以紗罩罩曬極干當歸酒浸曬乾白芍酒炒川芎各四兩熟地六兩酒蒸極熟何首烏九蒸覆盆子炒山萸去核炒旱蓮草酒拌蒸白茯苓乳拌血餘生地酒洗各四兩上藥不犯鐵器制完共和一處再用大熟地十二兩酒煮一晝夜取濃汁一碗拌藥內煉煉蜜為丸桐子大每服百丸空心酒下臨臥亦服一次治虛眼方凡虛人目無病到點燈時候即不見物或羞明只用羊肝煮食便效不必服他藥治雀目方日落不見物也石決明夜明砂各二錢豬肝白羊肝各一兩將肝二片中間盛藥麻線扎定淘米泔水一碗砂罐煮熟臨臥服又用羯羊肝一具不見水不犯鐵器以竹刀切開入穀精草細末瓦罐內煮熟不時服之屢驗黑羊者佳治風火眼洗方歸尾膽礬銅青各一分防風荊芥赤芍川連各二分杏仁十四粒去皮尖研上絹包煎洗治弦爛風赤眼洗方文蛤黃連去淨毛防風荊芥穗各五錢苦參四錢銅緑五分上為極細末以薄荷煎湯丸彈子大臨用以熱水化開乘熱洗眼每日三次神效一方有川芎當歸各四錢治爛眼皮方用掛金燈淨殼每殼一個摻入研細透明緑色膽礬末二釐或用殼十個或二十個裝套好外用淨瓷黃泥包裹好勿令泄氣炭火煅至中間殼將成黑灰存性放地上用碗蓋熄火將中間灰研細包好放土地上一夜出火毒每用灰少許放茶杯內以冷松蘿茶浸之用薄棉紙蓋在茶麵上俟茶滲出紙面上將此水洗眼皮每日五六次二三日即愈治火眼熱障眼痛不可忍者用黃連為末人乳拌勻似糊樣攤碗底上用艾如雞蛋大一塊放地上點著以黃連碗復上令艾熏透取起以清水一小杯調濃上覆棉紙一張隔紙透出黃藥汁以簪頻頻點洗即愈治眼中努肉方用蛇蛻一條將麻油三錢炒黃色不可焦黑緑豆三合炒砂糖一碗水一碗共煎七分食遠服立退二三年者可治兩服即愈治火眼方用小兒糞中蛔蟲一條用水洗淨掛陰處下用瓷盆盛其滴下之水入冰片五釐再加人乳一茶匙用熱水隔湯燉溫以雞毛蘸眼上立愈治風火眼方童便煎甘菊湯頻頻洗之點眼神方真川連川大黃黃芩川羌活甘菊花龍膽草薄荷防風荊芥木賊密蒙花各五錢北細辛川芎蟬蛻青葙子即雞冠子黃柏白蒺蔓荊子各三錢以上諸藥須揀淨用水二大碗熬煎濃汁成膏去渣一小鐘將上好爐甘石三兩放銀罐內煅酥研極細末用甜水飛過入冰片三分麝香一分五釐仍入乳鉢內磨細將前藥汁入內成丸如緑豆大銀硃為衣一時烘乾即收瓷瓶內不可見日臨用以水磨化點入兩眼角內輕者只用半丸重者一二丸即愈又冬天取淨臘雪將大荸薺同雪水磨粉曬乾加冰片少許入鵝毛管中點眼神效又名磨光散野荸薺粉洗淨去皮石臼中搗爛密絹絞汁如做藕粉法再用清井水飛曬乾爐甘石用黃連黃柏黃芩甘菊薄荷煎水煅再用童便煅一次將藥水飛曬乾珍珠入豆腐內煮過研細水飛每荸薺乾粉一兩配製過甘石五錢珠末三錢各將瓷瓶收貯臨用漸漸配合加入冰片少許點之明目去翳祕方錦紋大黃一兩北細辛四兩將二味用上高泉水一百二十兩將藥入砂鍋煎至二十兩以細絹濾去渣用大銀碗一個盛藥碗下以磚三塊放定碗底下將燈盞注麻油用燈草七根燃燈熏碗底內煎藥成膏滴水成珠每膏一兩用野荸薺粉五錢多些亦不妨冰片三分和勻作錠如多年的厚翳每兩加水飛過蟬蛻末五分須要去頭足揉碎去泥沙水洗曬乾為末水飛三次用又治飛絲入目每兩加銀硃五分研細末水飛曬乾用如風寒等翳每兩加青黛五分研細水飛曬乾用以上諸症隨症加藥入膏調勻點之最良用頭生小兒乳蘸點取荸薺粉法如取緑豆粉與藕粉同法須水澄極細曬乾再研極細須忌鐵器又野荸薺豬胰各等分搗和用雞子殼半個放藥在內臨臥合印堂上俟水流入目中翳隨淚出二十日即愈並治田螺頭眼又將新象牙物件水磨點翳膜上即去又方用新象牙磨屑將生男乳浸透點之即退又方刮孕婦大指甲末乳調敷即愈又方枸杞三錢木賊七根長寸許桂圓肉七個煎湯服月餘自效治遠年攀睛翳膜名五蛻散人蛻即指甲乳汁炒為末山甲炒蟬蛻洗淨炒龍蛻即蛇殼炒鳳蛻即雞子殼內白膜炒上為極細末每用三釐令患人含水一口患左眼吹入右鼻患右眼吹入左鼻再以錫作眼樣合患眼上如此三次則翳膜或血絲俱落治眼吹鼻散穿山甲五釐炒鵝兒不食草七釐人金即指甲一分半炒刺蝟皮三分半炒蛇蛻一分半蟬蛻五釐石蟹二分醋炙麝香三釐桔梗四分上為末每用三釐吹入鼻中其翳即下開瞽復明方生地枸杞甘菊淨瓣穀精草止用草不用葉木賊草如無翳不必用上藥各四兩用人乳拌浸一日曬共九日又用童便浸曬共十八日倘遇天陰下雨即將微火烘乾共研細末陳米粉調和為丸清晨白滾水下三錢半月即開光治損目破睛方用牛口涎每日點兩次須要避風黑睛破者亦瘥鼻治鼻淵腦漏方用羊卵子一對去膜切片頂大者尤妙醬油陳酒拌之放瓷碗內隔湯煮熟以陳酒送下飲微醉三五次即愈臨午服治鼻淵方用老刀豆文火焙乾為末酒服三錢重者不過三服即愈治鼻中時時流臭黃水甚者腦亦時痛名控腦砂有蟲在腦中用絲瓜藤近根處三五尺燒存性為末酒調服即愈治鼻痔方霜梅一個萆麻仁七粒生礬少許上三味同打將絲綿包裹塞鼻內一日夜即愈又方輕粉二錢杏仁七粒去油白礬五錢上為末吹入即化為水治鼻內生疔方爛黃雞糞荔枝肉同打爛塗上即愈治鼻息方七月七日收甜瓜蒂陰乾臨用一分研末再用白礬少許綿裹塞鼻又方瓜蒂五分研末麝香少許含水口中嗅味自落治鼻衄方麥冬五錢生地五錢水煎服立止又方緑豆粉一兩細茶二錢上為末涼水調服又方馬蘭草汁一杯吃下立止又方梔子炒黑百草霜龍骨火煅京墨牡蠣火煅血餘煅存性上為末用茅花水蘸濕蘸藥入鼻孔如無茅花將紙捻水蘸藥入鼻孔即止又方大蒜頭一個搗爛左鼻衄將蒜塗左足心右鼻衄塗右足心立止一方左塗右右塗左又方用象牙屑吹入鼻中即愈又方用生吳萸研末津調塗足底心湧泉穴上用山梔炒黑為末吹鼻中效又方胎髮燒灰烏梅一個煅共研吹鼻中立止治赤鼻方枇杷葉去毛一兩梔子仁五錢上為末每服二三錢溫酒下早服去右邊赤晚服去左邊赤再用後敷藥忌食胡椒生薑辛辣