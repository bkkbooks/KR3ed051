body:
  text: 卷四公選良方跌打損傷黎洞丹治一切無名腫毒昏困欲死並跌打損傷瘀血奔心昏暈不醒等症牛黃冰片各二錢五分阿魏雄黃各一兩麝香二錢五分生大黃兒茶天竺黃人參三七乳香去油沒藥去油血竭藤黃隔湯煮十數次去沫用子羊血拌曬如有山羊血加五錢不必用子羊血以上藥各二兩上共為末將藤黃化開為丸如芡實大若干少用白蜜外用蠟皮封固每服一丸用無灰酒送下外敷用茶滷磨塗忌一切生冷發物紫金酒治一切風氣跌打損傷寒濕疝氣移傷定痛血滯氣凝此酒善通經絡沉疴久病無不獲效每飲三五杯立見痛止若預飲之跌傷亦不痛官桂明乳香沒藥廣木香羊躑躅川羌各五錢川芎玄胡紫荊皮五加皮丹皮鬱金烏藥各一兩上為粗末將好酒十斤懸胎煮三炷香分作十小瓶治跌打損傷刀箭傷軍中第一仙方生狗頭一個將肉刮淨露天火煅存性為末人指甲灰血餘灰各一錢陳松香五錢共研極細摻傷處斷骨即續刀傷即愈以四味等分將酒內服亦可洗方防風荊芥甘草共煎湯無風處洗治箭鏃木器傷方用艾綿攤成餅子將火硝細末鋪上再用大蜣螂搗成末鋪火硝上包在傷處一日一夜即出又方用陳臘肉去皮取紅活美好者連肥切細將新象牙末及人指甲末拌臘肉內剁合一處厚敷四旁一飯頃其鏃自出一方巴豆微炒同蜣螂蟲同研敷之治金傷箭鏃傷方真降香一兩五倍子五錢共為末摻患處扎好即收口加象皮一兩更妙治金瘡方用瀝青不拘多少為末加響銅屑和勻摻立愈又方陳石灰無毛小鼠韭菜根共搗極爛作餅貼在背陰牆上待乾用刀刮下研細末敷之又方並治筋骨斷生半夏降香節紅銅屑五倍子炒上各等分為末摻上扎好又方降香節制白松香各一兩血竭一錢五分沒藥五分文蛤五錢炒共末摻扎一方用炒五倍子五錢不用蛤又方五倍子炙黃丹血竭大貝母各一錢赤石脂四錢海螵蛸二錢炙龍骨二錢共為極細末摻之又方用好雞骨炭擲地有聲者不拘多少與好松香等分搗成一塊用老韭菜汁拌入陰乾如此搗拌三四次方研細末收貯每遇金瘡敷之立效切不可飲冷水及稀粥只吃乾飯又方白蠟一兩藤黃三錢將麻油四兩煎數滾後下二味再煎數滾塗傷處立愈此方止痛止血並治打傷及湯火傷皆妙一方用白蠟二錢藤黃一錢麻油一兩治刀斧傷止血定痛生肌真降香銼碎炒存性五倍子微炒頭髮灰上各等分為末摻之將干箬葉護住以軟綿扎定兩日一換敷立止血方並治針灸疤肉發紅出血及一切血管出血不止者用熱黃牛糞塗之即止立止血方用舊綿絮燒灰掩之集靈接骨膏生地當歸大黃寄奴雄鼠屎各二兩鬧羊花紅花上肉桂川烏草烏大戟芫花甘草各一兩甘遂五錢五靈脂山甲各一兩紫荊皮血餘地鱉蟲各三兩野苧根四兩上用麻油四十四兩桐油二十四兩煎丹收好加乳香沒藥血竭阿魏各一兩加桃柳桑槐更妙另用地鱉末一兩鬧羊花末五錢收接骨丹將糞窖內多年瓦片洗淨醋煅九次研末每末一兩加五加皮男子發灰各五錢好醋調每歲一分好酒送下再用竹四片將竹青向內夾定患處勿動若皮破者勿用摻藥又方古銅錢五錢醋淬四十九次骨碎補去毛焙三錢乳香沒藥各去油自然銅醋煅土鱉蟲用生半夏一錢半炒去半夏不用以上各三錢血竭二錢共為末服一分加栝蔞仁七個同研放舌上酒送下頭一次加麝香一釐又方用母雞一隻要一斤重者殺後連毛骨剁爛如泥再將雞血和內再剁敷於患處用綢包緊三日即愈透骨丹治跌撲損傷深入骨髓或隱隱疼痛或天陰則痛或年遠四肢沉重無力此藥主之真神方也鬧羊花子一兩火酒浸炒三次童便浸一次焙乾乳香沒藥不去油真血竭各三錢上為末稱准和勻再加麝香一分同研瓷瓶收貯封固每服三分壯者五六分不必用夜飯須睡好方服酒可儘量送下服後避風有微汗出為要忌房事酸寒茶醋等物虛弱者間五日一服壯實者間三日一服桃花散治跌損刀傷狗咬爛腳等症年久風化石灰十升炒至桃花色存性錦紋大黃一兩焙脆研末將真麻油調敷當日敷更效加味鼠灰散陳石灰六兩大黃一兩童子發灰乳香沒藥蒲黃略炒各三錢上石灰與大黃同炒至石灰紫色為度研細取未開眼小鼠搗極爛和藥又搗勻為餅布包懸掛陰乾不拘刀斧等傷研末用韭汁拌敷之治跌打損傷方閃挫初時即於無風處將紙捻觸鼻內用力打噴涕二三十則氣升而止痛再用胡桃肉搗爛傾熱酒內儘量一醉而愈又方用韭菜打汁與童便各半和熱酒飲醉或有折傷脫節外用糟湯浸洗忍痛揉上用竹木綁扎急尋地鱉蟲炙脆為末酒調服又方骨節跌損脫者將生蟹一隻打極爛用滾熱酒傾入連飲數碗即以蟹渣塗患處半日間瑟瑟有聲脫處自合不能飲者數杯為率又方地鱉蟲酒炙十個地蟺干焙乾十條自然銅醋煅二錢骨碎補三錢乳香五分上為末加蘇木三錢酒煎服又方名七釐散當歸尾紅花桃仁大黃酒浸曬乾自然銅醋煅七次以上各一錢土鱉蟲去頭足炙焦五錢黃麻根燒灰存性血竭乳香沒藥兒茶硃砂雄黃古銅錢醋煅七次以上各三錢麝香五分骨碎補去毛三錢上為末每服大人一分二釐小兒七釐以陳酒送下出汗為度和傷方用遠年地坑中坑砂其坑雖不必在露天卻要透風有日光照著者為妙其砂取淌水石畔鑿下厚三四寸者更佳放屋中淨瓦溜中風吹雨灑日曬夜露常常反轉四五個月看兩面俱白已無臭氣研極細末每兩配入辰砂二三分每服五六分空心放舌上陳酒送下此方兼治一切虛勞吐血發熱並婦人一切血瘀乾血癆症治青腫不拘破不破不用開刀一夜復原不痛名松肉蔥白膏將不精不肥鮮豬肉二斤去皮骨加蔥白要一斤半再加明松香三兩研極細末以篩篩過方可連蔥放在肉內斬為極細攤敷患處以布腳帶裹扎緊不可寬至周時皮肉還原與不打無異床上房內最忌放氈皮等物須切記若膿血水任其流放總不妨治周身打傷方用大生蟹一隻小者兩三隻搗極爛大熱酒沖服極醉一夜即安治頭面跌撲青紫方用生半夏末醋調敷之神效治破傷風久不愈手背強直牙關緊閉者南星薑汁製一兩防風一兩蟬蛻五錢上為細末每服三錢滾黃酒一碗調服再吃生蔥三四根以被矇頭出汗汗盡為止忌燒酒病重者加魚鰾一兩炒存性研末每服三錢黃酒調下其風自退一方名獨勝散但用蟬蛻五錢去頭足為末好酒煎滾服之臨杖預服方自然銅醋煅七次當歸酒洗打無名異洗去浮土土鱉蟲乳香沒藥地龍去土曬乾蘇木上各等分為末煉蜜丸雞豆大每服三丸開水下治杖傷方初杖時甚者即服童便酒紅花酒傷處用熱酒浸揉洗血淨或未淨即用熱豆腐鋪上其氣如蒸則血散矣豆腐連換數次或白蘿蔔煮半熟打爛乘熱敷上連換則不致成杖癰傷命亦不致潰爛日久也又方用細白礦灰成塊者五錢以泉水或井水入灰於內化碎攪數十下澄清將麻油小半碗亦可以前澄清灰水傾去灰腳不用清者傾入油內以箸攪數十下其油即干次將大黃細末五錢樟冰五錢同研勻入油內調和然後敷上以皮紙蓋好再加草紙用腳帶扎緊立時黃水血水流盡鬆則再扎腫消痛止而愈一方加生半夏末五錢白蘞二錢尤妙又方用毛竹節燒灰重者五錢輕者三錢好熱酒送下其痛立止治棒瘡神膏用豬板油一斤熬去渣再入黃蠟三兩同熬滴水軟硬得中再下乳香沒藥去油兒茶各一錢二分冰片一錢共為細末即傾入瓷器內候溫再加輕粉末三錢布上攤貼三日滿口五日平復神效打板膏治死血鬱結厄逆不食並夾棍傷爛乳香沒藥各去油三兩輕粉血竭各三錢冰片三分麝香一分樟腦二錢黃蠟一兩二錢豬板油熬去渣淨油三兩兒茶二錢上為細末將油蠟同化成膏貼患處晝夜流出惡水即時蘇醒治夾打傷痛不可忍者活鯽魚一個約二三兩重者陳酒糟一鍾銅末五錢胡桃肉四兩共搗敷患處預備夾棍方併名小金蓮方乳香沒藥各去油一錢萆麻仁炒川烏草烏各五錢上共為末將肥皂二十個去弦及內外筋膜同藥搗極爛在夾棍先一日做四餅敷兩拐骨過夜次日洗去任夾無妨如治婦人金蓮敷在足骨上過一夜次日洗去骨軟如綿又方肥皂四五個地鱉蟲二十個銅末五錢陳糟二兩共搗敷如前法治夾棍瘡方初夾下將豬肉四兩用胡椒照人一歲一粒搗爛敷上扎好不用洗不可解動一夜即愈又方一出衙門即用熱童便一盆將足浸之如便冷燒紅磚二塊淬之即熱直至童便面上浮起白油其傷盡出庶不𭼊疒貢再用肥皂搗如泥入雞蛋清和勻敷傷處以草紙包裹用腳條縛緊一夜不動即效內服末藥方人中白煅一兩自然銅五錢乳香去油二錢木耳燒灰存性五錢牛膝三錢共為末再用牛膝三五錢煎酒調服如無末藥可用當歸川芎乳香獨活鱉蝨胡麻毛薑紅花五加皮各一錢將生白酒一壺煎數沸隨量飲避風寒厚被蓋出汗即愈如骨傷加土鱉一枚治拶傷方指上拶過有凹痕用銀硃和酒磨濃依痕圈之自復治自刎斷喉方自刎者乃迅速之症須救在早遲則額冷氣絶必難救矣初刎時氣未絶身未冷急用熱雞皮貼患處安穩枕臥或用絲線縫合刀口摻上桃花散多些為要急以綿紙四五層蓋刀口上以女人舊布裹腳周圍繞五六轉扎之頸項鬱而不直刀口方不開三日後急手解去前藥再用桃花散摻刀口仍急纏扎過數日用紅肉膏敷患處外用生肌長肉大藥膏貼之再以絹帛圍裹針線縫緊俟其長肉收功桃花散方石灰半升大黃一兩五錢切片二味同炒至石灰變紅色為度去大黃篩極細末此藥並治一切刀瘡出血不止俱效餘糧丸治脫力勞傷皂礬八兩用紅醋二茶杯煅至通紅色放地上出火毒餘糧石四兩醋煅七次砂仁四錢薑汁炒白豆蔻三錢枳殼四錢炒厚朴四錢炒真廣皮三錢乾漆一兩炒到煙盡白芷二錢川貝母二錢鐵梗茵陳五錢不見火海金沙一錢益母花五錢廣木香二錢地骨皮二錢上各為末煮黑棗為丸緩症朝服七分夜服八分重症每服一二錢好酒下此方不獨治腫脹如婦女乾血癆産後朝涼暮熱男婦反胃噎膈腹痛小兒吃泥土生米等物及積年虛黃脫力黃疸等症極重者服至六兩全愈孕婦忌服服此藥者忌河豚終身忌蕎麥又方禹糧石四兩醋煅皂礬四兩浮麥煅紅透生地二兩醋炒熟地二兩酒煮當歸一兩酒炒貝母去心一兩紅花五錢香附童便浸炒二兩生木香一兩陳香櫞炒二兩白朮土炒一兩茵陳杜仲鹽水炒砂仁去衣蔻仁炒白芷炒川牛膝酒炒川椒焙陳皮炒陳松蘿百草霜炒枳殼各一兩豨蘞草酒拌曬益母花各二兩上共為末棗肉二斤丸桐子大朝服七分暮服八分陳酒送下忌蕎麥諸豆麵食魚腥萱花糟物瓜茄生冷産後去皂礬圍藥將軍鐵箍散治諸毒瘡紅腫突起用藥四圍箍之不令滋蔓走注毒氣南星大黃蒼耳根鹽霜白梅各一兩白芨白蘞防風川烏各五錢草烏雄黃各三錢上為細末先以蒼耳根霜梅搗爛拌藥如干入醋調得勻在瘡四圍用藥作鐵筆敷之止留瘡高突處如藥干以雞毛蘸水潤之日換二三次大妙方內亦可再加陳小粉五倍白芷蝸牛芙蓉葉薄荷人中白等藥又方白芨白蘞南星半夏劉寄奴各四兩草烏五倍子石膏大黃各六兩芙蓉葉八兩上共為末毒硬者緑豆粉和醋調敷毒軟者以蜜調敷留頭出氣外以紙貼之神效又方五倍子十兩焙黑鳳仙花子三兩皂莢三兩炙灰存性大黃陳小粉炒黑明礬各三兩土木鱉炒黑人中白如無皮硝代之以上各一兩共為細末醋調敷神效一方加芙蓉葉三兩圍藥方無膿即消有膿即潰五倍子一兩白芷六錢藤黃百草霜各三錢生半夏生南星白芨陳小粉飛面各四錢共為末紅醋調敷一筆消治一切癰腫雄黃膽礬硼砂藤黃銅緑皮硝草烏各一兩麝香二錢上為細末和蟾酥為條如筆管大金箔為衣用時以醋磨濃將新筆蘸藥塗四圍連塗數次即愈神應圍藥治氣血不和壅遏為瘡高腫赤痛者又兼治痰鬱寒濕為瘡者用雄小活鯽魚七個鮮山藥四兩大蔥頭連須二十一個共搗爛再用千年陳石灰半斤生南星生半夏白芨赤芍細末各一兩和勻陰乾再研為細末臨用之時蜜水調敷四圍外用綿紙掩之治一切無名腫毒圍藥藤黃五錢五倍子二兩白蜜蔥頭各一兩用米醋調圍患處留頂勿敷應手散金銀花白芨白蘞川烏草烏芙蓉葉南星半夏大黃五倍子炒黑陳小粉炒黑陳石灰用桃桑槐枝拌炒紅色為度各四兩牙皂二兩乳香沒藥蟾酥各五錢丁香四錢共研細末臨用時加麝香一分陽毒用醋調敷陰毒燒酒調敷如毒堅硬加鮮山藥蔥白頭人頭上垢糖霜搗和前藥調敷患處中留一孔出氣四蟲丹治諸般疔瘡發背一應惡瘡神效芙蓉葉紫地丁各一斤千金子十兩去油殼桑蟲二兩炙乾活桑一兩曬乾或炙乾薑汁蒜汁各半斤蔥汁五兩上用陰陽水四斤煎至半斤去渣再用紅蛄三兩麝香三錢雄黃一兩研蜈蚣一兩研燒酒三兩盛傾銀罐內將鐵油盞蓋定炭火升過候酒盡即起再用燒酒一斤並後五味入藥內熬成膏子用瓷器收貯臨用時將井水化開圍患處如火之熱其毒即時消退可收下再治後人如不煎膏將前藥曬乾灑燒酒再曬再灑酒盡為度作末收藏臨用時篩細以井水調圍亦妙立消腫毒方名五色蟾酥墨雄黃銀硃膽礬韶粉藤黃銅緑硼砂各一兩麝香一錢上共為末用蟾酥為條如筆管大陰乾水磨塗患處立消治一切陰症毒瘡惡癤初起白色不甚腫附骨極痛敷藥提出陽分生半夏生山梔生白芥子上各等分飛面蔥汁白蜜調圍頂上留一小孔干則以蔥蜜汁潤之一日兩換自然紅腫高起治陰症疽發艾葉一斤硫黃雄黃各五錢以水同煮半日搗爛候溫敷上再煮再易十餘次知痛者可生治陰症敷藥方山梔苦杏仁各二十一粒北細辛二錢青殼鴨蛋清一個白蘿蔔一小個飛面一文蔥頭二十個連須蜜一兩上藥研末共搗爛寒天隔湯燉溫敷患處每日一換敷三次即消治陽症圍藥方花粉黃柏薑黃薄荷葉人中白大貝五倍子芙蓉葉各三兩白芷南星白芨白蘞各一兩五錢大黃小粉各五兩上共為末敷患處拔毒異法以極細鐵屑將好醋煎二三沸撈醋中鐵屑鋪於患處將上好活磁石一大塊頻頻吸之陰症用此其毒自出也清涼救苦散治一切天行時疫頭面耳目鼻腮項頸紅腫痛芙蓉葉桑葉白芨白蘞車前大黃黃連黃柏白芷雄黃赤小豆芒硝上各等分研末蜜水調敷頻頻掃之提藥提藥方治諸毒不起敷之立起藤黃雄黃各三錢蟾酥紅藥各二錢冰片麝香各一錢萆麻子肉一兩先將萆麻肉去皮打如魚凍水入諸藥打成膏瓷罐收貯勿令泄氣按此方與砂藤散相較斟酌其分量該用藤黃雄黃各三錢紅藥三錢或四錢冰片蟾酥或不用麝香或三分再宜加辰砂一錢大提藥方圍敷初起對口發背惡疽四五日即可消雄黃藤黃真當門子各一錢硃砂三分萆麻子肉三錢要不老不嫩紅升藥一錢五分如用一錢則略緩難效先將萆麻子研如泥後和各藥研爛用象牙匣封藏外用虎皮包好則不泄氣黃提藥方鬱金雄黃藤黃各二錢牛黃蟾酥硇砂麝香冰片各五分巴豆肉八錢萆麻肉上各研細搗磁遇症放膏藥上少許貼之治一切惡毒未成可消已成用之化腐疔毒更妙白靈藥爐甘石一兩黃連一錢黃柏黃芩各二錢將三黃煎濃汁將甘石放在銀罐內燒極紅收汁約九次以甘石酥為度曬乾研細加冰片五分治口碎點眼甚妙加珍珠少許治下疳可生肌長肉凡有熱毒配三白頭升藥人乳調敷立愈紅升丹名五靈升藥水銀白礬各五錢硃砂雄黃各二錢五分火硝八錢上照升法升之凡一切無名腫毒如潰久內敗四邊紫色黯色將靈藥水調研稀以雞毛掃於黯肉上立刻紅活死肉脫去再上生肌散即收功凡通腸痔漏將此藥以紙捻成條插管內七日其管即隨藥條脫去降藥白降丹名夏冰對配丹水銀淨火硝白礬皂礬炒白鹽以上藥各九錢煉法將前藥共研至不見水銀星盛於新大傾銀罐內以微火熔化火急則水銀上升走爐須用烰炭為妙熬至罐內無白煙起再以竹木枝撥之無藥屑撥起為度則藥吸於罐底謂之結胎胎成用大木盆一個盛水水盆內置淨鐵火盆一個以木盆內水及鐵盆之半腰為度然後將前結就之胎連罐復於鐵盆內之居中以鹽水和黃土封固罐口勿令出氣出氣即走爐再用淨灰鋪於鐵盆內灰及罐腰將灰按平不可搖動藥罐恐傷封口即要走爐鋪灰畢取燒紅栗炭攢圍罐底用扇微扇煉一炷香謂之文火再略重扇煉一炷香謂之武火炭隨少隨添勿令間斷而見罐底再煉一炷香即退火待次日盆灰冷定用帚掃去盆灰並將封口土去淨開看鐵盆內所有白霜即謂之丹將瓷瓶收貯待用愈陳愈妙其罐內原胎研摻癬瘡神效若恐胎結不老罐覆盆內一遇火煉胎落鐵盆便無丹降亦為走爐法用鐵絲作一三腳小架頂爐內撐住丹胎再為穩要此丹如遇癰疽發背疔毒一切惡毒用一釐許以津唾調點毒頂上以膏藥蓋之次日毒根盡拔於毒頂上頂上結成黑肉一塊三四日即脫落再用升藥數次即收功此丹用蒸粉糕以水少潤共和極勻為細條曬乾收竹筒內名為錠子凡毒成管即約量管之深淺插入錠子上蓋膏藥次日擠膿如此一二次其管即化為膿管盡再上升藥數次即收功矣此丹比升丹功速十倍但性最烈點毒甚痛法用生半夏對攙再加冰片少許能令肉麻不痛又方水銀一兩青鹽皂礬各二兩火硝二兩半硇砂雄黃硃砂各三錢白砒五分明礬二兩上共研勻放陽城罐內微火煨乾後降三炷香候冷取藥不可放生人雞犬衝破凡腫毒未成名件者用醋調點患處頭上看毒大小如桐子大泡起毒即消若已成不肯穿者亦用此丸將膏藥貼頭上半日即穿又方水銀火硝生礬各五分食鹽二分上共研末入傾銀罐內放炭火上文火煎滾滾至邊上先起焦黃色候至滿面俱焦黃米色為度將罐離火候冷再用圓正擂盆一個裡面須揀光細者將銀罐連藥輕輕倒合在擂盆內罐口與擂盆縫間須用棉紙條墨水潤濕加鹽泥封固然後將擂盆坐於大水盆中罐底上先加文火用扇扇之先文後武煅至以五寸線香為度退去炭火候冷先掃去罐口外鹽泥然後開罐取降於擂盆底內之藥藥色以潔白如霜者為上若青黃黑色者不可用或以銀簪腳與磨亮刀頭略沾微唾蘸藥在上即刻起鏽者為佳每用用新棉花蘸藥敲些些於膏藥上比升藥更要少些貼後兩杯熱茶時即發痛半日即止毒重者每日一換膏毒輕者貼兩三日亦不妨若貼大腫毒膏上先放些麝香阿魏然後上此藥少許貼之若要做咬頭藥代針丸將麵糊以竹片拌和做成細條切作芝麻粒大放膏心中對腫頭貼之此藥不可沾在指頭上沾則要疼痛發泡退皮此藥陳久者少痛性和緩卻要多用些如第一次降完開出倘藥色不白可將罐內之藥刮淨此藥無所用處只將降於擂盆底內之藥刮出另將水銀火硝生礬各五分食鹽二分並將擂盆內降不透之藥與四味頭一併研和從新再入銀罐照依前法降之此藥若一次降不如法不妨兩次三次連降即降至十數次方能降好計籌已有水銀五錢在內矣每次只要將銀罐鏟淨或另換新銀罐每次只要用水銀火硝生礬各五分食鹽二分直降到好方止初起煎時須要火候得法若火候不及則罐中結胎尚嫩水銀尚活倒合轉來非連胎墮入擂盆底內即活水銀先溜入擂盆底中若火候太過結胎太老非水銀先已飛去即有降不下之病總以結胎不嫩不老為度用烰炭火最得法凡瘡毒已穿破者忌用代針點頭代針膏治瘡瘍膿熟不潰乳香二分白丁香巴豆炒焦鹼各五分上為末熱水調點瘡頭干則常以鹼水潤之又方桑木灰七錢礦子灰五錢蕎麥秸灰茄科灰各一兩上四味放鍋內水五碗滾十數滾用布袋濾去渣將水從新用鐵杓熬至一小杯存用如腫毒數日內有膿不得自破其頭如瘡大者將此藥在頭上畫一十字即破其膿就出諸般大瘡有疔角腐肉不脫者用此藥水洗之即去又點面上黑痣雀斑神效透骨丹蟾酥硼砂輕粉巴豆各五錢蝸牛二個麝香一分先將藥研細後入巴蝸再研瓷瓶收貯每用少許乳汁化開將瘡頭輕輕撥破挑藥如米許大納於瘡口外以膏藥蓋之長肉收口生肌散即名海龍粉龍骨血竭紅粉霜乳香沒藥海螵蛸赤石脂各一分嫩石膏二分上為細末敷上極效大凡諸生肌散內要配紅粉霜若要去腐肉每生肌散一兩配入粉霜或三分或五分如治下疳等瘡每兩隻配入一二分又方血竭象皮蚌殼灰大貝母龍骨各一錢赤石脂熟石膏各二錢兒茶八分乳香六分收口摻藥龍骨一錢煅熟厚象皮二錢煅熟石膏五錢兒茶輕粉乳香沒藥二味去油琥珀各五分白螺螄殼煅末二錢上共為細末摻上即愈又方燈草灰白螺螄殼煅末舊黑傘紙煅灰輕粉各三分冰片珍珠各五釐血竭二分八寶丹治腐肉已盡新肉遲生摻上立效乳香沒藥各去油血竭輕粉各二錢兒茶龍骨鉛粉各一錢冰片五分共為極細末用筆管繃細紗篩瘡上潤肌散治一切瘡癤結蓋後干痛及冬月手足凍裂並湯火傷當歸生地各五錢真麻油四兩將藥入油內熬十數沸去渣加黃蠟一兩瓷瓶收貯一方用黃占七錢白占五錢麻藥麻藥方此係外科動刀針不痛之藥白芷製半夏川芎木鱉去殼依法泡製烏藥牙皂當歸大茴香紫荊皮各二兩木香五錢川烏草烏各一兩俱生用共為細末每服一錢好酒調下麻木不知疼痛若人昏沉用鹽水飲之即解又方名孫武散蓽茇生半夏南星肉桂乳香沒藥胡椒各一錢川烏三七蟾酥草烏各二錢丁香八分麝香少許花蕊石二錢半風茄子三錢共為細末入瓷瓶內臨用敷之瘤癭治血瘤方用甘草煎膏以筆塗四圍一日上三次又將芫花大戟甘遂各等分為末醋調另以新筆塗甘草圈內勿近甘草次日縮小再如前塗三四次愈系瘤法兼去鼠奶痔用芫花根洗淨帶濕不得犯鐵器於木石器中搗取汁用線一條浸半日或一宿以線系瘤經宿即落如未落再換線不過兩次自落落後以龍骨訶子末敷瘡口即合系鼠奶痔依上法纍用之極效如無芫花根只用花泡濃水浸線消瘤方用極細生鐵屑醋拌放銅杓內煅干則再拌如此三次研極細再用醋調敷便覺患處不甚適意過一宿剝去再敷以平為度治眼皮生瘤方用生雞蛋一個頂上敲一小洞入川貝母末三分仍糊好飯上蒸熟食之每日吃三個一月愈枯瘤散灰莧菜即藜藿曬乾燒灰半碗蕎麥燒灰半碗風化石灰一碗三味和一處淋汁三碗慢火熬成霜取下配後藥番木鱉三個搗去油巴豆六十粒搗去油胡椒十九粒擦去粗皮明雄一錢人言一錢上共為末入前藥和勻以瓷瓶收貯不可見風以滴醋調勻用新羊毛筆蘸藥點瘤當頭瘤有碗大則點藥如龍眼核大若茶杯大則點藥如黃豆大干則頻頻點之其瘤乾枯自落如血瘤破以發灰摻之粉瘤破以白麻皮燒灰摻之外以膏護好自能斂口收功斂瘤膏治癭瘤枯落後用此搽貼生肌收口海螵蛸血竭輕粉龍骨象皮乳香各一錢雞蛋五個煮熟用黃熬油一小鐘上各研細末將蛋油調勻用甘草湯洗淨患處以雞毛掃敷再將膏藥貼之治癭氣頸腫方黃藥子一斤酒十斤浸之入瓶蒸透常常飲之勿絶酒氣三五日漸消常把鏡照或以線每日量之覺消即停飲否則令人項細也海帶丸治癭氣久不消海帶海藻貝母青皮陳皮各等分上共為末蜜丸如彈子大食後噙一丸諸瘋治大麻瘋方此症全身腫脹頭髮眉毛俱落兩腳臭爛者將蝦蟆一隻用泥裹之燒熟去泥乘熱放瓷碗內以滾黃酒衝入上用小瓷碗蓋之泡半時只服酒取汗為度只服一次三日全愈治鵝掌瘋方用白鴿糞為末夜間先用生桐油塗患處將鴿糞燒煙燻之須用舊吊桶去底罩火上以手架桶上手上用物遮蔽勿使煙氣泄去熏至黃色為度熏後勿洗手須過一夜二三次即愈又方用紫背浮萍不拘多少曬乾瓦上燒煙將患處熏之到熱時用扁柏搗汁塗之極重者三次必愈又方將豨蘞草一把藏糟一小塊煎湯洗手將生桐油搽患處用青松毛扎緊炭火上燒煙燻手勿見湯水次日再洗再搽再熏如此七日全愈指甲壞者俱效屢試屢驗真神方也六月伏中治之更便除根又方用大黃鱔一條去腸與頭尾切一寸一段以香油一兩入鍋內將鱔魚豎起煎之將枯去魚留油入瓷罐內將穿山甲燒細末用少許以此油調搽患處將炭火炙又方並治一切手足瘋用香樟木打碎煎湯每日早晚溫洗三次洗半年必愈治鶴膝瘋方此症初起雖用火針及灸及一切敷提之藥皆不能效必要使兩膝眼發泡泡穿出黃水方能奏功用老虎腳跡草取其根打爛入蜆殼內合膝眼上扎好待發泡挑穿出水俟其結疤即能行矣大約一月全愈一方用鐵線帚草根一分石見穿草用根梗俱紅色者佳連根梗葉俱用如秋冬根梗俱老止用其葉半分俱要當日取新鮮者隔宿勿同同打加飛面少許亦扎膝眼內又方鬧羊花蒼朮各四兩將童便煎數滾洗患處又方大肥皂四個去核生薑蔥各四兩大附子八錢硫黃五錢將陳米醋一斤煮藥搗如膏加樟冰一兩共研和敷患處止痛治白癜風方硫黃密陀僧輕粉各一錢麝香五釐上共為細末白水茄蒂蘸藥擦之生薑片亦可糟茄蒂更妙治腎囊風濕熱疙瘩作癢搔之則痛名蛇床子湯蛇床子歸尾靈仙苦參各五錢用水五碗煎數滾入盆內先熏後洗兩三次即愈治腎囊癢方用蔥三十根胡椒花椒各一兩蛇床子末一兩均作三服煎湯洗之立愈治腎囊腫癢內有疥蟲用好花椒烘脆研極細末真柏油調塗外以舊帛包之治腎囊瘋腎子腫大一名繡球瘋將雞蛋煮熟去白留黃炒出油再用老杉木燒灰存性調油搽之治腎子爛出方用老杉木燒灰存性蘇葉為末各等分敷上仍以蘇葉包之治腎子腫如水晶陰汗潮濕方用灶心土三升研碎砂鍋內炒極熱加川椒小茴香於上將陰囊放在上面冷即再炒三次即愈內服除濕湯治囊濕方白枯礬五錢蛇床子二錢黃柏大黃石菖蒲各一兩上為細末和勻河水調敷濕則乾摻或用六一散摻之亦效治男子陽痿囊濕女人陰癢方用蛇床子煎湯洗之立愈癬疥治各種癬瘡方用新鮮羊蹄葉不拘多少搗爛加川椒白糖並食鹽少許以布共包之浸好陳醋內半日取布包搽癬三日即愈治濕癬方癬成濕瘡浸淫轉甚以至諸藥不效者用蘆薈二兩炙甘草一兩俱研極細末先以溫漿水將癬洗淨敷之立干便瘥真神方也治癬方用大露蜂房一個不拘多少以生礬填入孔內用破罐盛之仰口朝上用炭火煅令白礬化盡為度取出研末搽癬上一二次即除根永不再發又方火硝石灰輕粉硫黃銀硃上各等分研細用老薑汁谷樹汁大蒜汁蜜汁土大黃汁共和一鍾將前藥入汁內攪如漿糊先用穿山甲刮破取檳榔切斷蘸藥擦五日愈又方名九熏丹用上好銅青二三兩研細將上好燒酒拌之須不幹不濕塗於粗工碗底內翻轉合地上以磚墊露一線下以蘄艾熏之候乾再拌再熏如此九次少亦要七次約以青色帶黑為度然後再研細將燒酒拌做成錠子用時以醋磨搽每日三五次三五日後若覺乾裂以菜油少許潤之七日可愈矣又方生半夏三粒明礬一錢鳳仙花二十朵梗葉亦可土大黃根不拘多少上共搗爛和醋少許先以穿山甲刮碎患處擦上即愈又方銀硃藤黃各一錢將谷樹汁調搽一二次即愈又方川槿皮海桐皮尖檳樟冰苦參黃柏白芨各二錢雷丸一錢五分楓子杏仁各二十粒木鱉四個用火酒浸七日將穿山甲刮癬少碎以酒搽之即愈又方土槿皮二兩苦參一兩斑蝥一錢去頭足尾炒黃土木鱉子肉三錢尖檳榔生礬生南星各五錢生半夏三錢用河水井水火酒各一碗將前六味先浸一宿至臨煎時入南星半夏再添河水井水火酒各一碗煎一炷香時候去渣存性埋土中七日出火毒否則發泡痛甚不時塗擦又方名五黃散雞腳大黃硫黃雄黃薑黃藤黃上各等分為細末菜油調塗患處七日勿洗浴全愈又方硫黃一兩研細蛇床子一兩略炒枯取起乘熱摻入硫末令其收入生礬枯礬炒過花椒衣樟腦冰片各五錢銀硃三錢飛鹽三分上共為細末以生豬板油去筋膜搗如泥調和少許先將患處刮碎以手指染藥擦之藥不須多但取滋潤浴後擦之每日三五次忌浴三日即愈或柏油調亦可並治疥瘡治癩疥瘡方生礬枯礬水銀各二錢雄黃三錢尖檳榔五錢忌見火蛇床子五錢炒斑蝥七個用糯米同炒炒熟去米不用先將水銀放罐子內即入青鉛二錢俟青鉛與水銀煬成一塊取起然後將檳榔研細次將斑蝥研再將明礬雄黃研總以極細為妙諸藥和勻方入水銀再研用無蠟柏油再研和搽擦一二次即愈凡男婦並小兒頭上乳頭上陰囊上俱忌搽未出痘小兒忌搽又方蛇床子苦參蕪荑各一兩雄黃五錢枯礬一兩二錢硫黃五錢輕粉二錢樟腦二錢大楓子肉川椒各五錢上各為細末生豬油調擦汗斑治汗斑方白附子硫黃密陀僧各一兩上俱為末用生薑蘸搽三五日即愈又方密陀僧五錢硫黃一兩上研細末醋調煨姜蘸搽患處次日即焦每日搽一次七日內須忌洗浴待其黑色退即愈矣治夏月汗斑如疹方密陀僧八錢雄黃四錢上研極細以姜蘸藥擦之治痱子方緑豆粉一兩滑石五錢輕粉二錢上為細末以棉蘸藥撲於患處雀斑治雀斑方名豔容膏白芷甘菊花去梗各三錢白果二十個紅棗十五個珠兒粉五錢豬胰一個上將珠粉研細余俱搗爛拌勻外以蜜拌酒釀燉化入前藥蒸過每晚搽面清晨洗去又方名玉容散白殭蠶白附子白芷三奈硼砂各三錢石膏滑石各五錢白丁香一錢冰片三分上為細末臨睡用少許水和搽面人乳調搽更妙治雀斑酒刺白屑瘋皮作癢名玉肌散真緑豆粉八面滑石一兩白芷一兩白附子五錢上共為細末每晚用數錢搽面治雀斑亦治瘡疤將清水調鷹糞塗之自愈疣痣點一切疣痣及息肉雞眼方桑柴灰風化石灰各一斤鮮威靈仙六兩煎濃汁淋二灰取汁熬成稀膏瓷器收貯用點諸患處不必挑破應手而除治痣方用水調石灰一盞如稠粥樣揀整糯米不破者半插灰中半出灰外經一宿米色變如水晶樣用簪挑少許置米於痣上半日痣自脫出不得著水三二日愈兒科初生治小兒初生下滿身無皮但是紅肉用早稻米粉干撲至生皮方止或以伏龍肝雞子清調塗小兒初生即服此藥花痘稀疏並不生瘡癤大黃一分甘草一分硃砂五釐另研末將上二味人乳浸飯上燉一時去渣加入硃砂調勻服之凡小兒初生口齶並牙根生白點名馬牙不能食乳急用針挑破出血用好京墨薄荷湯磨以手指蘸墨遍口齶擦之切勿令食乳待睡方可雪口小兒雪口硼砂七釐火硝三釐冰片五釐銅緑一釐共研極細末用新羊毛筆蘸桐油潤筆再蘸藥末敷於口舌上半日即愈甚者敷二三次小兒初生數日內不吃乳舊方用豬婆乳然而難得今即用活蚌剖開取水三四茶匙服之即能吃乳矣神妙臍風小兒臍風初生後七日或臍口受風令兒生病令乳母每日午時前看小兒上齶牙根但有如粟米白泡隨用手輕磨破可免他疾臍爛不幹用白羯子即羊莫子燒灰敷上即愈或用枯礬龍骨煅過為末敷上封臍散斷臍帶後用龍骨一錢煅紅棉灰一錢歸頭一錢焙上為細末用少許乾摻臍內小兒無辜卒死取蔥白納入下部及兩鼻孔中氣通或嚏即活稀痘稀痘丹赤豆小飯赤豆黑豆緑豆粉草各一兩為細末用竹筒刮去皮兩頭留節一頭鑿一孔以藥末入筒中用杉木砧塞緊黃蠟封固外以小繩系之投入臘月廁中滿一月即取出洗淨風乾每藥一兩配臘月梅花片三錢和勻若得雪中梅花片落地者不著人手以針刺取者更妙如急用入紙封套內略烘即干兒大者用一錢小者用五分俱以霜後絲瓜藤上小絲瓜煎湯調空心服湯宜多服服後忌葷腥十二日解出黑糞為驗一次可稀三次不出每年服一次稀痘神方傳方之家已十三代未出天花矣萆麻子三十六粒去殼揀白色者去衣用黃色者不用硃砂一錢須透紅劈砂另研細末真麝香五釐將三味於乳鉢內研爛如泥每年端午日午時用手指蘸藥搽兒頭頂心前心後心兩手心兩足心兩手彎兩腿彎兩腋下共搽十三處如銅錢大約半分厚搽藥後任其自干自落不可洗去即端陽前半月初生小兒亦可至期搽用痧痘梅花丸治小兒痘疹起死回生之藥臘月取梅花不拘多少陰乾有一兩外用當歸一錢五分茯苓一錢升麻五分竹茹八分甘草三分用水鍾半煎至八分溫熱時將梅花拌浸一日取出曬乾研極細末如小兒病用雄雞一隻吊起左足良久將竹槍入雞喉內取血調梅花末為丸如緑豆大滾水送下二丸即刻見功如小女兒病用老雌雞吊右足如前取血製造曬乾以好瓷器收貯不拘遠年近日聽用此方濟人萬無一失小兒臨危任是毒甚略有微氣用滾水送下不拘時只不宜多服人牙散人牙一兩鹽泥固濟煅存性研極細末每服一枚酒下凡痘密如蠶種皮毛一片無異蠶跡者死症也法取人牙煅研酒調四五朝時服之痘可立起換痘丹犀角一兩梅蕊一兩絲瓜灰一兩雄黃一錢硃砂二錢滑石一錢麝香三分上為末用麻黃膏丸如芡實大每服一丸酒漿化下凡痘密如蠶種皮毛一片者服此毒便解痘即變另發一層好痘起死回生紫金錠治小兒一切危痘各照湯引磨服神效辰砂五錢陳膽星五錢蟬蛻三錢甘草三錢麝香一錢蛇含石四兩一方加殭蠶四錢白附子四錢白茯神四錢白朮四錢一方加殭蠶三錢白附子五錢減去甘草一錢共為極細末飯搗丸每錠重五分救逆痘痘至七八日或十日灰陷倒塌抓破無血空殼無漿目開不食破損處如焦木灰色危篤垂死老白雄雞冠血愈多愈妙白酒釀十匙芫荽汁二十匙三味攪和隔湯燉徐徐熱服少待皮膚紅活即有另發大痘目復閉面復腫其內陷之毒皆復發出漸思飲食初與米飲次與黃耆粥飲不必更服他藥也服一次若未全起五更再與一服倘面紅氣喘不妨神燈照法治痘癢塌之極火到癢除川椒艾葉紅棗芫荽茵陳乳香白芷梢陳香櫞安息香共為末作紙捻熏照白螺散治痘抓破白螺螄不拘多少片腦少許香油調搽患處即愈治痘後翻疤膿水漬蔓延赤石脂一兩寒水石一兩大貝母七錢為末乾摻象牙散治痘後翻疤新象牙三錢兒茶一錢半殭蠶二錢炒斷絲珍珠三錢腐制共為極細末用油胭脂調塗毒水如注漸漸收口痘瘡餘毒眼目膜障用蛇蛻一具洗淨焙燥又用天花粉與蛇蛻各等分以羊肝破開入藥在內麻皮縛定再用米泔水煮熟食之旬余即愈再蛇蛻須用潔白色者若用雜色者有毒拔毒散治痘後手足肩背痘毒癰腫韶粉一兩大黃五錢炒雄黃三錢另研五倍子一兩炒乳香五錢另研沒藥五錢另研黃丹五錢白芨一兩炙白蘞一兩炙黃柏七錢炒白芷一兩焙共為細末蜜水調搽治痘毒方用新鮮楝樹根皮同緑豆搗爛厚敷患處立愈齒病敷藥方治小兒痘疹餘毒牙齦破爛出血或成走馬牙疳者立效並治大人牙爛口舌破碎如神人中白一錢銅緑三分麝香一分