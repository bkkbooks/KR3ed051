服能清心腎開鬱結兼以分利若專溫補反生濕熱為害矣治孕婦痢疾祕傳妙方用雞蛋一個破一孔如指大以銀簪腳攪勻加入黃丹三錢五分用紙封口在飯鍋上蒸熟食之即愈胎前安胎方胎氣不安或腹痛或腰痛或飲食不甘俱宜服之或五六個月常服數貼最妙足月亦可服人參五分虛者加倍白朮一錢土炒陳皮五分甘草三分當歸一錢川芎八分白芍一錢炒砂仁七分炒紫蘇一錢香附六分炒黃芩一錢炒腹痛倍加白芍腰痛加鹽水炒杜仲川斷內熱口渴去砂仁加麥冬見紅加酒炒地榆生地以上各一錢又方歸身一錢五分川芎七分白芍一錢炒熟地一錢白朮一錢五分條芩一錢五分炒砂仁一錢炒陳皮一錢蘇梗五分炙甘草四分如或下血加蒲黃阿膠腹痛加香附枳殼如惡阻加竹茹去地黃治胎漏方用炒熟蠶豆殼磨末每服三四錢加沙糖少許調服治死胎不下皮硝二錢壯者三錢寒月加熟附子五分酒半杯童便一杯煎二三沸溫服治胎衣不下用牛膝三錢葵子五錢水煎服産後産後腹脹閉結膨悶氣結坐臥不安大麥芽炒為末用一合陳酒調一方每服三錢産後面紫乃惡血上衝氣壅故目不合山楂一兩炒枯童便煎服産後面黑乃惡血入肺發喘欲死蘇木一兩水三鍾煎至一鍾調人參細末五錢服治産後惡露不盡發熱用童子母雞一隻竹刀殺干撏去毛破肚將陳酒洗淨用益母草花一二兩裝入雞肚內加陳酒浸隔湯煮爛去益母花只將雞淡吃連酒汁亦吃留雞骨炙存性研末沙糖調酒送下先吃雞一隻第二三隻將金茶匙草代益母花照前法入雞肚內煮吃骨亦吃一二隻即愈産後血暈韭菜切入有嘴瓶內將醋三碗煎滾入瓶內將瓶嘴塞産婦鼻孔即醒産後陰翻澤蘭葉煎濃湯熏洗即收乳疾吹乳不通雄豬前腳爪一個鬼饅頭二個並煮食之一日即通雖無子女人食之亦有乳治乳不通絲瓜連子燒存性酒下一二錢被蓋取汗即通治乳岩方此病先因乳中一粒大如豆漸漸大如雞蛋七八年後方破爛一破則不可治矣宜急服此藥生蟹殼數十枚放砂鍋內焙焦為末每服二錢好酒調下須日日服不可間斷青皮散治乳癰初起青皮去瓤山甲炒白芷甘草土貝母各八分為細末溫酒調服乳癰乳痛敷方活鯽魚一個鮮山藥一段如魚長者同搗爛敷上以紙蓋之吹奶乳癰南星半夏皂角去皮弦子炒黃五倍子去蟲窠炒黃各等分研極細末醋調敷一宿立效乳癰煎方乳香一錢沒藥五分苡仁二錢川芎五分甘草五分防風一錢銀花二錢知母一錢陳皮一錢當歸五分栝蔞仁二錢木通一錢香附一錢貝母五分橘葉二十片鮮者更妙水酒各半煎食後服四服必愈乳癰乳岩及外吹螃蟹蒸熟取腳上指甲砂鍋內微火炙脆研末一兩配鹿角銼末二錢如遇此症用陳酒飲一杯將藥一錢或八分放在舌上以酒送下再飲一杯俱食後服治乳癖用蝦蟆一個去皮令淨入半夏三錢麝香半分共搗爛為一大餅敷患處用帛縛之約三時許解去其效如神乳癰奶癤活螃蟹十餘隻取腳爪尖約七八錢陰陽瓦炙黃研末陳酒送下出汗即愈治乳癰癖癧痃敷藥用野花椒葉曬乾為末雞子清調敷立愈癰尤效神效栝蔞散治婦人乳疽奶勞黃栝蔞子多者一個去皮焙為細末如急用只爛研川當歸洗去蘆焙切細半兩生甘草半兩滴乳香一錢另研通明沒藥二錢半另研上用無灰酒三升同於銀石器中慢火熬取一升清汁分為三次食後服如有奶勞便服此藥杜絶病根如毒氣已成能化膿為黃水毒未成即內消疾甚者再合服以退為度乳疽之方甚多獨此一方神效無比萬不失一內消乳癧方大貝母白芷等分為末每服二錢白酒下如有鬱症加白蒺藜若有孕忌用白芷治男婦乳癧祕方無不立愈鮮橘葉多些夏枯草香附童便制青皮先將夏枯草切碎用青皮香附曬乾後將橘葉放石臼內打爛同前藥拌勻再曬極干後方上磨為極細末陳米飯為丸白湯下不拘時服治乳瘰癧潰爛者方可服神效雄鼠糞三錢兩頭尖者便是土楝樹子三錢經霜者佳川者不用露峰房三錢俱煅存性為末分作三服酒下間兩日服一服痛即止膿盡收斂奇效治乳痛極凶者不過四貼炒白芍八分甘草三分蘇梗七分柴胡七分炒黃芩八分香附一錢醋炒當歸八分酒洗川芎七分金銀花一錢半貝母一錢半連翹八分栝蔞霜八分去油淨加橘葉三十片水二鍾煎八分食遠服無孕加青皮八分醋炒有孕去青皮加薑汁炒砂仁末五分同煎一方栝蔞用一個去油海上乳毒奇方當歸漏蘆穿山甲獨活乳香沒藥桔梗青皮水酒煎服立消雜症雄黃藜蘆散治婦人陰中突出如蛇或雞冠菌樣者雄黃一錢冰片二分輕粉一錢鱉頭煅黃色一錢蔥管藜蘆二錢研細如面俱為末和勻再研瓷罐收貯先用芎歸湯煎洗隨後搽藥早晚二次其患漸收芎歸湯川芎當歸白芷甘草膽草各等分每用五錢煎湯洗患處搽藥婦人乳腫不論內外吹名必消散取五穀大楊樹上木耳菌拭淨瓦上炙焦存性為末每服三錢沙糖調陳酒送下即消婦人陰戶內生瘡癢痛難堪用鮮豬肝切成條於香油中微燙過抹樟腦川椒末插入戶內引蛆蟲候一時辰取出再換二三條即愈婦人陰戶內生瘡作癢活蚌一個剖開將有肉半個手拿對陰戶一夜次日又用一個全安蛤蚌亦不用甚大婦人陰瘡如蟲咬癢痛者生搗桃葉綿裹納之一日三四易婦人交接傷陰出血不止五倍子研極細末摻之附録急救諸方立消疔瘡外治神效方松香二十兩製法附後沒藥三兩研極細末白蠟二兩切為粗末銅緑五兩研細過絹篩再研至無聲為度黃蠟十兩刮取粗片百草霜五兩研細過絹篩再研至無聲為度明乳香三兩研極細末麻油六兩選吉日淨室焚香齊戒虔誠修合忌婦人雞犬及孝服人見用桑柴火先將麻油入鍋煎滾次下松香候稍滾三下白蠟候稍滾四下黃蠟候稍滾五下乳香候稍滾六下沒藥候稍滾七下銅緑候稍滾八下百草霜滾過數次於鍋內冷透搓成條子丸如桂圓核大藏淨瓷器內臨用時以一丸呵軟捻扁貼患處頃刻止痛次日腫消即愈已走黃者貼之亦無不霍然神速之效百發百中疔瘡藥之至寶也此方活人甚多是當廣為傳揚貼後忌食葷腥辛辣沸湯大熱食生冷發物麵食豆腐茄子黃瓜酒忌水洗忌惱怒憂悶大忌房事制松香法用桑柴灰煎汁澄清入松香煮爛取出納冷水中少時再納灰水中煮以色白如玉為度取百草霜法先須刮淨鍋底專燒茅柴百草取煙煤用如以別種柴煙煤用入則不驗戒鴉片煙癮方潞黨參一兩金櫻子一兩粟殼四錢萊蔔子一兩韭菜子一兩半夏一兩陽春砂仁五錢廣陳皮五錢陳酒五斤倭芙蓉灰五錢此方將各味煎好濾去渣滓和入陳酒內再煎一沸置蓋鉢中勿令泄氣於癮至之前先飲一鍾癮可不至更將淡酒一杯衝入其內每次一鍾即衝入一鍾藥性冀其漸減而煙癮庶可全消急救誤食洋烟方明雄二錢雞蛋清一個生桐油一兩調勻河水灌服即吐或吐有未盡用硬雞毛或鴨毛蘸桐油直掃咽喉乃吐若同燒酒誤食者加葛花三錢炒末調服醒後用生甘草五錢食鹽五分明礬五分金銀花五錢煎服又宜多食柿餅以解洋烟並桐油之毒如毒重時久萬無生理者用艾茸如大黃豆大灸氣海穴在臍下一寸五分較准後用墨一記即按記處灸之灸時肚腹兩邊即往下推運不可歇手灸到手足能動略知疼痛乃止仍宜照前服藥急救難産良方三麻四豆脫衣裳合研細末加麝香共成一餅貼交骨須臾母子兩分張此方用萆麻子三個巴豆四個均去皮加麝香二分同研成餅貼産門上交骨其胎立下如月份未足胎或轉動不可輕用若足月臨盆周日不下者用此立驗儀徵張姓婦生産三日不下子死腹中命在呼吸照方配用死胎立下産母保全治傷方晉人尚氣每有事甚細微一語不合輒即鬥毆刃傷較他省為多又不善於調治動致斃命今訪有祕方屢試屢驗神效異常特行刊發有牧民之責者亟須捐資慎選真實藥材如法制備一有報傷之案無論跌打損傷金刃他物骨折骨碎立即給藥照方醫治勿臥熱炕定有奇效州縣仁心為質遇有命案往往執罪疑惟輕之論不肯嚴辦然與其曲為開脫以致死者含冤何如速加拯救俾兩命具得保全功德豈不更大乎急救方開列於下十寶散冰片一分二釐麝香一分二釐辰砂一錢二分乳香去油一錢二分子紅花四錢血竭一錢六分雄黃四錢兒茶二分四釐歸尾一兩沒藥一錢四分以上十味共為細末貯瓷瓶黃蠟封口勿令走氣一治跌打損傷皮肉青腫未破者用陳醋調敷患處腫消即愈一治刃傷並各器械傷皮破血出者以藥末摻上包裹不可見風血止即愈一治內傷骨碎或骨已斷折先將骨節湊准用陳醋調藥末厚敷患處以紙裹外加老棉緊包好再用薄板片夾護將繩慢慢捆緊不可移動藥性一到骨自接矣須靜養百日如犯房事必成殘疾一治刃傷深重未致透膜者先用桑皮線縫好多摻藥末於上以活雞皮急急貼護如前骨損養法即愈一遇跌打昏迷不省急用少許以陳醋沖服自然醒轉以便調治此方神奇雖遇至重之傷鮮有不起生者張蘭渚中丞頒發天長縣署奉到後即照方修合用之屢效因思此種良藥不特牧民者可以救人即民間如法制備取以治傷亦甚有益急救跌打損傷方並治馬踢刀箭等傷白附子十二兩研末白芷天麻生南星防風羌活各一兩研末就破處敷上傷重者用黃酒浸服數錢青腫者水調敷上破傷風方荊芥五錢黃蠟五錢魚鰾五錢炒黃色艾葉三片入無灰酒一碗重湯煮一炷香熱飲之汗出立愈惟百日內不可食雞肉解砒毒神效方防風一兩研細末清水調服又方石青研末清水調服以上諸方系百試百驗真有起死回生之功勿以尋常方藥視之還望好善諸君廣為傳播造福無量
